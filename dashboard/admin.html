<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Center - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.4);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; display: none; /* Masqué jusqu'à l'auth */
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
            min-height: 100vh;
        }

        /* --- SÉCURITÉ --- */
        #admin-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            font-family: 'JetBrains Mono'; color: var(--accent); font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* --- NAVIGATION --- */
        .main-nav {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 1.2rem; }
        .nav-logo span { color: var(--accent); }
        
        .btn-logout { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* --- LAYOUT --- */
        .container { padding: 40px; max-width: 1400px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }

        .panel { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .panel-header {
            font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--muted);
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- TABLES --- */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; padding: 12px; }
        td { padding: 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; }

        .badge { 
            padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; 
            border: 1px solid currentColor;
        }
        .badge-online { color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .badge-offline { color: var(--muted); background: rgba(148, 163, 184, 0.1); }

        /* --- ACTIONS --- */
        .btn-group { display: flex; gap: 8px; }
        .btn-action { 
            background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid var(--accent);
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700;
        }
        .btn-action:hover { background: var(--accent); color: white; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* --- FLASH BOX --- */
        .flash-box { display: flex; flex-direction: column; gap: 15px; }
        textarea, input { 
            background: #020617; border: 1px solid var(--border); border-radius: 12px; 
            color: white; padding: 12px; font-family: inherit; transition: 0.3s;
        }
        textarea:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(59,130,246,0.2); }

        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="admin-overlay">🔒 SYSTÈME VERROUILLÉ</div>

    <nav class="main-nav">
        <div class="nav-logo">VTC<span>OPS</span> <small style="font-size: 0.6rem; color: var(--muted);">DISPATCH v3.2</small></div>
        <div class="nav-right">
            <button onclick="logout()" class="btn-logout">Quitter le terminal</button>
        </div>
    </nav>

    <div class="container">
        <div class="grid">
            <div class="main-content">
                <div class="panel" style="margin-bottom:30px; border-top: 4px solid var(--warning);">
                    <div class="panel-header">📩 Dossiers d'enrôlement en attente</div>
                    <table id="table-pending">
                        <thead><tr><th>Candidat</th><th>Matériel Préféré</th><th>Action</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="panel" style="border-top: 4px solid var(--accent);">
                    <div class="panel-header">🚛 Surveillance de la flotte active</div>
                    <table id="table-drivers">
                        <thead><tr><th>Chauffeur</th><th>Statut</th><th>Dernier Job</th><th>Wallet</th><th>Actions</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel flash-box">
                    <div class="panel-header">📡 Transmission Prioritaire</div>
                    <input type="text" id="flash-target" placeholder="Indicatif chauffeur">
                    <textarea id="flash-msg" rows="5" placeholder="Saisir l'ordre de mission ou l'avertissement..."></textarea>
                    <button class="btn-action" style="padding:15px; font-size:0.8rem;" onclick="sendFlash()">ÉMETTRE LE SIGNAL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        // Sécurité par Prompt
        function checkLock() {
            const pass = prompt("IDENTIFICATION REQUISE\nEntrez le code de sécurité Dispatch :");
            if (!pass) {
                window.location.href = "index.html";
            } else {
                socket.emit('check_admin_lock', pass);
            }
        }

        socket.on('admin_lock_success', () => {
            document.getElementById('admin-overlay').style.display = "none";
            document.body.style.display = "block";
            socket.emit('get_admin_data');
        });

        socket.on('admin_lock_fail', () => {
            alert("ACCÈS REFUSÉ : Code incorrect.");
            window.location.href = "index.html";
        });

        // Actions
        function validate(name) {
            socket.emit('admin_validate_driver', name);
            setTimeout(() => socket.emit('get_admin_data'), 300); // Refresh rapide
        }

        function banDriver(name) {
            if(confirm(`RÉVOCATION : Confirmer le bannissement de ${name} ?`)) {
                socket.emit('admin_ban_driver', { name, reason: 'Révocation par le Dispatch' });
                setTimeout(() => socket.emit('get_admin_data'), 300);
            }
        }

        function prepareFlash(name) {
            document.getElementById('flash-target').value = name;
            document.getElementById('flash-msg').focus();
        }

        function sendFlash() {
            const t = document.getElementById('flash-target').value;
            const m = document.getElementById('flash-msg').value;
            if(!t || !m) return alert("Cible ou message manquant.");
            
            socket.emit('send_private_flash', { name: t, message: m, type: 'warning' });
            alert("Signal transmis avec succès.");
            document.getElementById('flash-msg').value = "";
        }

        // Rendu des données
        socket.on('receive_admin_data', (data) => {
            // Rendu Pending
            const pBody = document.querySelector('#table-pending tbody');
            pBody.innerHTML = data.pending.length ? '' : '<tr><td colspan="3" style="text-align:center; color:var(--muted)">Aucune candidature.</td></tr>';
            data.pending.forEach(d => {
                pBody.innerHTML += `
                    <tr>
                        <td style="font-weight:800;">${d.name}</td>
                        <td>${d.truck?.favorite || 'Standard'}</td>
                        <td><button class="btn-action" onclick="validate('${d.name}')">APPROUVER</button></td>
                    </tr>`;
            });

            // Rendu Actifs
            const dBody = document.querySelector('#table-drivers tbody');
            dBody.innerHTML = '';
            data.drivers.forEach(d => {
                const isOnline = d.lastUpdate ? (new Date() - new Date(d.lastUpdate)) < 30000 : false;
                dBody.innerHTML += `
                    <tr>
                        <td>
                            <div style="font-weight:800;">${d.name}</div>
                            <div style="font-size:0.7rem; color:var(--muted);">${d.truck?.brand || 'Repos'}</div>
                        </td>
                        <td><span class="badge ${isOnline ? 'badge-online' : 'badge-offline'}">${isOnline ? 'LIVE' : 'OFF'}</span></td>
                        <td><div style="font-size:0.8rem;">${d.job?.destination || 'Aucun'}</div></td>
                        <td style="font-family:'JetBrains Mono'; font-weight:800; color:var(--success);">${Math.round(d.wallet)} €</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn-action" onclick="prepareFlash('${d.name}')">MSG</button>
                                <button class="btn-action btn-danger" onclick="banDriver('${d.name}')">BAN</button>
                            </div>
                        </td>
                    </tr>`;
            });
        });

        function logout() {
            if(confirm("Fermer la session Dispatch ?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        window.onload = checkLock;
        setInterval(() => { if(document.body.style.display === "block") socket.emit('get_admin_data'); }, 10000);
    </script>
</body>
</html>
