<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Panel - VTC Ops</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --card: #1e293b; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #94a3b8; --border: #334155;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 30px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 400px; gap: 30px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .card-title { font-family: 'JetBrains Mono'; font-size: 0.9rem; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .candidate-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 10px;
        }
        .btn-group { display: flex; gap: 8px; }
        .btn { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; transition: 0.2s; }
        .btn-ok { background: var(--success); color: white; }
        .btn-no { background: var(--danger); color: white; }
        .btn-warn { background: var(--warning); color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        textarea { width: 100%; height: 100px; background: #0f172a; border: 1px solid var(--border); border-radius: 12px; color: white; padding: 15px; font-family: 'Inter'; box-sizing: border-box; resize: none; }
        .btn-send { width: 100%; margin-top: 15px; padding: 15px; background: var(--accent); border: none; color: white; border-radius: 12px; font-weight: 900; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--muted); font-size: 0.7rem; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body>

    <h1 style="text-align:center; font-family:'JetBrains Mono'; letter-spacing:5px;">DISPATCHER <span style="color:var(--accent)">PANEL</span></h1>

    <div class="admin-grid">
        <div class="main-content">
            <div class="card">
                <div class="card-title">📨 Candidatures en attente</div>
                <div id="pending-list">
                    <p style="color:var(--muted); font-size: 0.8rem;">Chargement...</p>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🚚 Flotte Opérationnelle</div>
                <table>
                    <thead>
                        <tr>
                            <th>Chauffeur</th>
                            <th>Solde</th>
                            <th>Distance</th>
                            <th>Camion Actuel</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="drivers-list"></tbody>
                </table>
            </div>

            <div class="card">
                <div class="card-title">📍 Planifier un Convoi</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="convoy-dep" placeholder="Ville Départ" style="padding:10px; border-radius:8px; border:none; background:#0f172a; color:white;">
                    <input type="text" id="convoy-arr" placeholder="Ville Arrivée" style="padding:10px; border-radius:8px; border:none; background:#0f172a; color:white;">
                    <input type="datetime-local" id="convoy-date" style="padding:10px; border-radius:8px; border:none; background:#0f172a; color:white;">
                    <button class="btn-send" style="margin:0;" onclick="createConvoy()">Créer le Convoi</button>
                </div>
            </div>
        </div>

        <aside>
            <div class="card">
                <div class="card-title">📣 Communication Globale</div>
                <textarea id="flash-input" placeholder="Ex: Attention convoi exceptionnel à 21h sur Calais !"></textarea>
                <button class="btn-send" onclick="sendFlash()">Diffuser le Message</button>
            </div>

            <div class="card" style="background: rgba(239, 68, 68, 0.05); border-color: var(--danger);">
                <div class="card-title" style="color:var(--danger)">⚠️ Zone de Danger</div>
                <button class="btn-no" style="width:100%; padding:15px;" onclick="resetStats()">Réinitialiser le classement</button>
            </div>
        </aside>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="nav.js"></script> <script>
        const socket = io();

        socket.emit('get_admin_data');

        socket.on('receive_admin_data', (db) => {
            // 1. Candidatures (Tableau MongoDB)
            const pendingList = document.getElementById('pending-list');
            if(!db.pending || db.pending.length === 0) {
                pendingList.innerHTML = `<p style="color:var(--muted); font-size: 0.8rem;">Aucune candidature.</p>`;
            } else {
                pendingList.innerHTML = db.pending.map(driver => `
                    <div class="candidate-row">
                        <div>
                            <div style="font-weight:800;">${driver.name}</div>
                            <div style="font-size:0.7rem; color:var(--muted);">Camion: ${driver.meta?.favoriteTruck || 'Inconnu'}</div>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-ok" onclick="validate('${driver.name}')">Valider</button>
                            <button class="btn btn-no" onclick="reject('${driver.name}')">Refuser</button>
                        </div>
                    </div>
                `).join('');
            }

            // 2. Chauffeurs Actifs
            const driversList = document.getElementById('drivers-list');
            driversList.innerHTML = db.drivers.map(d => `
                <tr>
                    <td style="font-weight:700;">${d.name}</td>
                    <td style="color:var(--success)">${Math.round(d.wallet).toLocaleString()} €</td>
                    <td>${Math.round(d.distance).toLocaleString()} KM</td>
                    <td style="color:var(--muted); font-size:0.7rem;">${d.truck?.model || 'À l\'arrêt'}</td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-warn" onclick="sendBonus('${d.name}')">Prime</button>
                            <button class="btn btn-no" onclick="banDriver('${d.name}')">Bannir</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        });

        function validate(name) { socket.emit('admin_validate_driver', name); }
        function reject(name) { if(confirm(`Supprimer ${name} ?`)) socket.emit('admin_reject_driver', name); }
        
        function sendBonus(name) {
            const amount = prompt(`Montant de la prime pour ${name} :`, "1000");
            if(amount) socket.emit('admin_send_bonus', { name, amount: parseInt(amount) });
        }

        function banDriver(name) {
            if(confirm(`⚠️ BANNIR DÉFINITIVEMENT ${name} ?`)) socket.emit('admin_ban_driver', name);
        }

        function createConvoy() {
            const data = {
                departureCity: document.getElementById('convoy-dep').value,
                arrivalCity: document.getElementById('convoy-arr').value,
                date: document.getElementById('convoy-date').value,
                server: "Simulation 1"
            };
            socket.emit('admin_create_convoy', data);
            alert("Convoi planifié !");
        }

        function sendFlash() {
            const msg = document.getElementById('flash-input').value;
            if(msg) {
                socket.emit('send_global_flash', msg);
                document.getElementById('flash-input').value = '';
                alert("Diffusé !");
            }
        }
    </script>
</body>
</html>
