<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Direction - VTC Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #ff4444; 
            --bg: #080a0f; 
            --card: #11141d; 
            --success: #00ff88;
            --warning: #ffcc00;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            padding: 40px;
            text-align: center;
            background-image: radial-gradient(circle, #11141d 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .admin-container { max-width: 500px; margin: auto; }

        .admin-card { 
            background: var(--card); 
            border: 2px solid #333; 
            border-radius: 15px; 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            transition: 0.3s;
        }

        h1 { font-family: 'Orbitron'; color: var(--accent); margin-bottom: 30px; letter-spacing: 3px; }
        h3 { font-family: 'Orbitron'; font-size: 0.85rem; margin-bottom: 15px; letter-spacing: 1px; color: #aaa; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 5px; 
            border: 1px solid #222; 
            background: #05070a; 
            color: white; 
            box-sizing: border-box;
            text-align: center;
            font-family: 'Rajdhani';
            font-size: 1.1rem;
        }

        button { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 5px; 
            font-family: 'Orbitron'; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-flash { background: var(--accent); color: white; }
        .btn-bonus { background: var(--success); color: black; }
        .btn-repair { background: var(--warning); color: black; }
        
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .security-note { color: #444; font-size: 0.75rem; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>🛠️ DIRECTION VTC</h1>

        <div class="admin-card" style="border-color: #444;">
            <h3>🔑 CLÉ DE SÉCURITÉ OBLIGATOIRE</h3>
            <input type="password" id="admin-pass" placeholder="Entrez le code secret...">
            <div class="security-note">Requis pour valider chaque opération cloud</div>
        </div>

        <div class="admin-card" style="border-color: var(--accent);">
            <h3 style="color: var(--accent);">📢 ALERTE GÉNÉRALE (FLASH)</h3>
            <input type="text" id="flash-msg" placeholder="Ex: Pause de 15min à la prochaine aire !">
            <button class="btn-flash" onclick="sendFlash()">Diffuser sur tous les écrans</button>
        </div>

        <div class="admin-card" style="border-color: var(--success);">
            <h3 style="color: var(--success);">💸 COMPTABILITÉ (PRIME / AMENDE)</h3>
            <input type="text" id="bonus-name" placeholder="Pseudo du chauffeur">
            <input type="number" id="bonus-amount" placeholder="Montant (ex: 1000 ou -500)">
            <button class="btn-bonus" onclick="sendBonus()">Appliquer la transaction</button>
        </div>

        <div class="admin-card" style="border-color: var(--warning);">
            <h3 style="color: var(--warning);">🛠️ UNITÉ D'ASSISTANCE (REPAIR)</h3>
            <input type="text" id="repair-name" placeholder="Pseudo du chauffeur à dépanner">
            <button class="btn-repair" onclick="sendRepair()">Réparer le camion à distance</button>
        </div>

        <a href="index.html" style="color:gray; text-decoration:none; font-size:0.9rem;">← Quitter le Panel Direction</a>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Fonction pour envoyer un message Flash
        function sendFlash() {
            const msg = document.getElementById('flash-msg').value;
            const pass = document.getElementById('admin-pass').value;

            if(!msg || !pass) return alert("Veuillez remplir le message et le code secret !");

            socket.emit('admin_flash', msg); 
            alert("Message flash diffusé !");
            document.getElementById('flash-msg').value = "";
        }

        // Fonction pour les Primes et Amendes
        function sendBonus() {
            const name = document.getElementById('bonus-name').value;
            const amount = document.getElementById('bonus-amount').value;
            const pass = document.getElementById('admin-pass').value;

            if(!name || !amount || !pass) return alert("Données manquantes pour la transaction.");

            socket.emit('admin_give_bonus', {
                driverName: name,
                amount: amount,
                secret: pass
            });

            alert(`Ordre financier envoyé pour ${name}`);
            document.getElementById('bonus-name').value = "";
            document.getElementById('bonus-amount').value = "";
        }

        // Fonction pour la Réparation à distance
        function sendRepair() {
            const name = document.getElementById('repair-name').value;
            const pass = document.getElementById('admin-pass').value;

            if(!name || !pass) return alert("Veuillez indiquer le nom du chauffeur et le code secret.");

            socket.emit('admin_repair_truck', {
                driverName: name,
                secret: pass
            });

            alert(`Signal de réparation envoyé à l'unité de ${name}`);
            document.getElementById('repair-name').value = "";
        }
    </script>
</body>
</html>
