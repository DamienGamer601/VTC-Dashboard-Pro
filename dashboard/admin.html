<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Center - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.5);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 30px;
            display: none; /* Masqué tant que le code n'est pas bon */
        }

        #admin-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 9999; display: flex;
            justify-content: center; align-items: center; font-family: 'JetBrains Mono';
            color: var(--accent); font-size: 1.2rem;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.9rem; }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid transparent; }
        .badge-online { background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: var(--success); }
        .badge-offline { background: rgba(148, 163, 184, 0.1); color: var(--muted); border-color: var(--border); }

        .btn-action { 
            background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid var(--accent);
            padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 0.7rem; font-weight: 700; transition: 0.2s;
        }
        .btn-action:hover { background: var(--accent); color: white; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        
        .flash-box { display: flex; flex-direction: column; gap: 15px; }
        textarea, input { background: #020617; border: 1px solid var(--border); border-radius: 12px; color: white; padding: 12px; outline: none; }
        
        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="admin-overlay">🔒 VERROUILLÉ - VÉRIFICATION DU CODE...</div>

    <div class="header">
        <div>
            <h1 style="font-family:'JetBrains Mono'; margin:0;">DISPATCH <span style="color:var(--accent)">CENTER</span></h1>
            <p style="color:var(--muted); font-size:0.9rem;">Interface d'Administration Sécurisée</p>
        </div>
        <div class="badge badge-online">SYSTÈME LIVE</div>
    </div>

    <div class="grid">
        <div class="main-content">
            <div class="panel" style="margin-bottom:30px; border-left: 4px solid var(--warning);">
                <div style="color:var(--muted); font-size:0.8rem; margin-bottom:15px; font-weight:800;">📩 CANDIDATURES</div>
                <table id="table-pending">
                    <thead><tr><th>Candidat</th><th>Camion</th><th>Action</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="panel">
                <div style="color:var(--muted); font-size:0.8rem; margin-bottom:15px; font-weight:800;">🚛 FLOTTE ACTIVE</div>
                <table id="table-drivers">
                    <thead><tr><th>Chauffeur</th><th>État</th><th>Localisation</th><th>Solde</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel flash-box">
                <div style="color:var(--muted); font-size:0.8rem; font-weight:800;">📡 TRANSMISSION FLASH</div>
                <input type="text" id="flash-target" placeholder="Nom du chauffeur">
                <textarea id="flash-msg" rows="4" placeholder="Message urgent..."></textarea>
                <button class="btn-action" style="padding:12px;" onclick="sendFlash()">ENVOYER L'ORDRE</button>
            </div>
        </div>
    </div>

    <script>
        // Connexion auto-adaptative (marche en local et sur Render)
        const socket = io(); 

        function checkLock() {
            const pass = prompt("Accès restreint : Entrez le code secret");
            if (!pass) {
                window.location.href = "index.html";
            } else {
                socket.emit('check_admin_lock', pass);
            }
        }

        socket.on('admin_lock_success', () => {
            console.log("Accès Admin : OK");
            document.getElementById('admin-overlay').style.display = "none";
            document.body.style.display = "block";
            socket.emit('get_admin_data');
        });

        socket.on('admin_lock_fail', () => {
            alert("Code incorrect !");
            window.location.href = "index.html";
        });

        // Lancer la sécurité au chargement
        window.onload = checkLock;

        socket.on('receive_admin_data', (data) => {
            console.log("Données reçues :", data);
            
            // Gestion des Candidatures
            const pendingBody = document.querySelector('#table-pending tbody');
            if (pendingBody) {
                pendingBody.innerHTML = data.pending.length ? '' : '<tr><td colspan="3" style="text-align:center;">Aucun dossier</td></tr>';
                data.pending.forEach(d => {
                    pendingBody.innerHTML += `<tr><td style="font-weight:800;">${d.name}</td><td>${d.truck?.favorite || 'N/A'}</td><td><button class="btn-action" onclick="validate('${d.name}')">ACCEPTER</button></td></tr>`;
                });
            }

            // Gestion des Chauffeurs
            const driversBody = document.querySelector('#table-drivers tbody');
            if (driversBody) {
                driversBody.innerHTML = '';
                data.drivers.forEach(d => {
                    const isOnline = d.lastUpdate ? (new Date() - new Date(d.lastUpdate)) < 60000 : false;
                    driversBody.innerHTML += `
                        <tr>
                            <td><div style="font-weight:800;">${d.name}</div><div style="font-size:0.7rem; color:var(--muted);">${d.truck?.brand || 'Repos'}</div></td>
                            <td><span class="badge ${isOnline ? 'badge-online' : 'badge-offline'}">${isOnline ? 'LIVE' : 'OFF'}</span></td>
                            <td><div style="font-size:0.8rem;">${d.job?.destination || 'En attente'}</div></td>
                            <td>${Math.round(d.wallet || 0)} €</td>
                            <td>
                                <button class="btn-action" onclick="prepareFlash('${d.name}')">MSG</button>
                                <button class="btn-action btn-danger" onclick="banDriver('${d.name}')">BAN</button>
                            </td>
                        </tr>`;
                });
            }
        });

        function validate(name) { socket.emit('admin_validate_driver', name); setTimeout(() => socket.emit('get_admin_data'), 500); }
        function banDriver(name) { if(confirm(`Ban ${name} ?`)) { socket.emit('admin_ban_driver', { name, reason: 'Admin Action' }); setTimeout(() => socket.emit('get_admin_data'), 500); } }
        function prepareFlash(name) { document.getElementById('flash-target').value = name; document.getElementById('flash-msg').focus(); }
        function sendFlash() { 
            const t = document.getElementById('flash-target').value;
            const m = document.getElementById('flash-msg').value;
            if(!t || !m) return alert("Champs vides");
            socket.emit('send_private_flash', { name: t, message: m, type: 'warning' }); 
            alert("Envoyé"); 
            document.getElementById('flash-msg').value = "";
        }

        setInterval(() => { 
            if(document.body.style.display === "block") socket.emit('get_admin_data'); 
        }, 15000);
    </script>
</body>
</html>
