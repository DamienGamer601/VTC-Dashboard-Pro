<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Trophées - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #1e293b; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.5);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }

        /* --- STYLE NAVBAR --- */
        .main-nav {
            background: #0f172a;
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 1.2rem; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }
        .nav-links a.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-logout { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger);
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.8rem;
        }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* --- STYLE CONTENU --- */
        .content { padding: 40px; }
        .awards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .award-card { 
            background: var(--card); border-radius: 20px; padding: 25px; text-align: center;
            border: 2px solid #334155; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            filter: grayscale(1); opacity: 0.5; transform: scale(0.95);
        }
        
        .award-card.unlocked { 
            filter: grayscale(0); opacity: 1; border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.15);
            transform: scale(1);
        }

        .award-card.unlocked:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.25);
        }

        .award-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
        .award-title { font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; }
        .award-desc { font-size: 0.8rem; color: #94a3b8; line-height: 1.4; }
        .xp-bonus { font-family: 'JetBrains Mono'; color: #f59e0b; font-size: 0.7rem; margin-top: 10px; display: block; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-logo">VTC<span>OPS</span></div>
        <div class="nav-links">
            <a href="index.html">Tableau de bord</a>
            <a href="hiring.html">Recrutement</a>
            <a href="awards.html" class="active">Trophées</a>
            <a href="admin.html" style="color: var(--warning)">Admin</a>
        </div>
        <div class="nav-right">
            <button onclick="logout()" class="btn-logout">Déconnexion</button>
        </div>
    </nav>

    <div class="content">
        <h1 style="font-family: 'JetBrains Mono'; margin-top: 0;">🏆 SALON DES <span style="color:var(--accent)">TROPHÉES</span></h1>
        <p style="color: #94a3b8;">Réalisez des exploits pour débloquer vos badges de chauffeur.</p>

        <div id="awards-list" class="awards-grid">
            </div>
    </div>

    <script>
        const socket = io();
        const myName = localStorage.getItem('driverName');

        // Sécurité : redirection si pas de nom de chauffeur
        if (!myName) window.location.href = "login.html";

        function logout() {
            if(confirm("Voulez-vous vraiment vous déconnecter ?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        // Demander les trophées au serveur
        socket.emit('get_awards_status', myName);

        socket.on('receive_awards', (data) => {
            const container = document.getElementById('awards-list');
            
            if (!data.all || data.all.length === 0) {
                container.innerHTML = `<p style="color:var(--muted)">Aucun trophée disponible pour le moment.</p>`;
                return;
            }

            container.innerHTML = data.all.map(a => {
                const isUnlocked = data.mine && data.mine.includes(a.id);
                return `
                    <div class="award-card ${isUnlocked ? 'unlocked' : ''}">
                        <span class="award-icon">${a.icon}</span>
                        <div class="award-title">${a.name}</div>
                        <div class="award-desc">${a.desc}</div>
                        <span class="xp-bonus">${isUnlocked ? '✅ DÉBLOQUÉ' : '+ ' + a.xp + ' XP BONUS'}</span>
                    </div>
                `;
            }).join('');
        });
    </script>
</body>
</html>
