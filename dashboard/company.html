<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilan Financier - VTC Ops Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: #1e293b;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background-image: radial-gradient(circle at 50% 0%, #0f172a 0%, #020617 100%);
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        .main-nav {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 1.2rem; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        
        .btn-logout { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger);
            padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 0.75rem;
        }

        /* --- CONTENT --- */
        .container { padding: 40px; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .report-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 35px; }
        
        .kpi-card { 
            background: var(--card); padding: 30px; border-radius: 28px; 
            border: 1px solid var(--border); position: relative; overflow: hidden;
        }
        .kpi-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent); opacity: 0.5;
        }
        .kpi-card.rev::before { background: var(--success); }
        .kpi-card.exp::before { background: var(--danger); }

        .kpi-label { color: var(--muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .kpi-val { font-family: 'JetBrains Mono'; font-size: 2.2rem; font-weight: 800; display: block; margin-top: 15px; }
        
        .profit-positive { color: var(--success); }
        .profit-negative { color: var(--danger); }

        .details-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px; }
        .detail-card { 
            background: var(--card); border-radius: 28px; border: 1px solid var(--border); padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .detail-title { 
            font-family: 'JetBrains Mono'; font-size: 0.85rem; color: var(--accent); 
            margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-weight: 800; 
        }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 16px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; }
        tr:last-child td { border: none; }
        
        .label-muted { color: var(--muted); font-size: 0.75rem; font-family: 'JetBrains Mono'; }
        
        .rank-badge {
            background: rgba(59, 130, 246, 0.1); color: var(--accent);
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-weight: 800; font-size: 0.8rem;
        }

        @media (max-width: 950px) { .report-grid, .details-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-logo">VTC<span>OPS</span></div>
        <div class="nav-links">
            <a href="dispatcher.html">Live Fleet</a>
            <a href="hiring.html">Recrutement</a>
            <a href="company.html" class="active">Bilan Financier</a>
            <a href="awards.html">Trophées</a>
        </div>
        <button onclick="logout()" class="btn-logout">OFFLINE</button>
    </nav>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-family: 'JetBrains Mono'; margin: 0; font-size: 2.2rem; letter-spacing: -1px;">
                    RAPPORT <span id="month-name" style="color:var(--accent)">OCTOBRE</span>
                </h1>
                <p style="color: var(--muted); margin-top: 5px; font-weight: 500;">Analyse de performance de la flotte opérationnelle.</p>
            </div>
            <div style="text-align: right;">
                <span class="label-muted">SÉCURITÉ DES DONNÉES</span><br>
                <span style="font-size: 0.7rem; color: var(--success); font-weight: 800;">● CRYPTAGE ACTIF</span>
            </div>
        </div>

        <div class="report-grid">
            <div class="kpi-card rev">
                <span class="kpi-label">Revenus Bruts</span>
                <span class="kpi-val" id="rev-val" style="color: var(--success);">0 €</span>
            </div>
            <div class="kpi-card exp">
                <span class="kpi-label">Charges & Primes</span>
                <span class="kpi-val" style="color: var(--danger);" id="exp-val">0 €</span>
            </div>
            <div class="kpi-card" style="background: rgba(59, 130, 246, 0.03); border-color: var(--accent);">
                <span class="kpi-label">Bénéfice Net</span>
                <span class="kpi-val" id="net-val">0 €</span>
            </div>
        </div>

        <div class="details-section">
            <div class="detail-card">
                <span class="detail-title">📑 FLUX DE TRÉSORERIE</span>
                <table id="last-tx-table">
                    </table>
            </div>

            <div class="detail-card">
                <span class="detail-title">🏆 TOP GÉNÉRATEURS DE REVENUS</span>
                <table id="top-earners-table">
                    </table>
            </div>
        </div>
    </div>

    

    <script>
        const socket = io();
        
        function logout() {
            if(confirm("Confirmer la clôture de la session financière ?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        // Configuration du mois
        const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        document.getElementById('month-name').innerText = monthNames[new Date().getMonth()].toUpperCase();

        socket.emit('get_company_report');

        socket.on('receive_company_report', (data) => {
            // Mise à jour des chiffres avec animation simple
            animateValue("rev-val", data.totalRevenue, " €");
            animateValue("exp-val", data.totalExpenses, " €", true);
            
            const netEl = document.getElementById('net-val');
            netEl.innerText = data.netProfit.toLocaleString() + " €";
            netEl.className = "kpi-val " + (data.netProfit >= 0 ? "profit-positive" : "profit-negative");

            // Transactions
            const txTable = document.getElementById('last-tx-table');
            txTable.innerHTML = data.recentTransactions.length ? data.recentTransactions.map(tx => `
                <tr>
                    <td><span class="label-muted">${new Date(tx.date).toLocaleDateString()}</span></td>
                    <td style="font-weight:700; color: #f8fafc;">${tx.reason}</td>
                    <td style="text-align:right; font-weight:800; font-family:'JetBrains Mono'; color:${tx.type === 'REVENUE' ? 'var(--success)' : 'var(--danger)'}">
                        ${tx.type === 'REVENUE' ? '+' : '-'}${tx.amount.toLocaleString()}€
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="3" style="text-align:center; padding:40px; color:var(--muted);">Aucune donnée disponible</td></tr>';

            // Top Earners
            const earnersTable = document.getElementById('top-earners-table');
            earnersTable.innerHTML = data.topEarners.length ? data.topEarners.map((driver, index) => `
                <tr>
                    <td style="width: 40px;"><div class="rank-badge">#${index + 1}</div></td>
                    <td style="font-weight:700;">${driver.name}</td>
                    <td style="text-align:right; font-weight:800; font-family:'JetBrains Mono'; color:var(--accent)">
                        ${driver.totalGenerated.toLocaleString()} €
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="3" style="text-align:center; padding:40px; color:var(--muted);">Calcul des performances en cours...</td></tr>';
        });

        function animateValue(id, end, suffix, isNegative = false) {
            const obj = document.getElementById(id);
            let start = 0;
            const duration = 1000;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = Math.floor(progress * end);
                obj.innerText = (isNegative ? "-" : "") + current.toLocaleString() + suffix;
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
