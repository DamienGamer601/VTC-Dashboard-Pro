<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Prochains Convois - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        
        .container { padding: 40px; }
        .convoy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .convoy-card { 
            background: var(--card); border-radius: 20px; padding: 25px; 
            border: 1px solid #334155; border-left: 6px solid var(--accent);
            position: relative; transition: 0.3s;
        }
        .convoy-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .timer { font-family: 'JetBrains Mono'; color: #f59e0b; font-size: 1.1rem; margin-bottom: 15px; font-weight: bold; }
        .route { font-weight: 900; font-size: 1.5rem; margin: 10px 0; letter-spacing: -0.5px; }
        .details { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; margin-bottom: 20px; }
        
        .badge { 
            background: rgba(59, 130, 246, 0.1); color: var(--accent); 
            padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800;
            text-transform: uppercase; border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .btn-join {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: #334155; color: white; font-weight: 800; cursor: pointer;
            transition: 0.3s; font-size: 0.8rem;
        }
        .btn-join.active { background: var(--success, #10b981); }
        .btn-join:hover { background: var(--accent); }
        
        .participants { margin-top: 15px; font-size: 0.75rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="font-family: 'JetBrains Mono'; margin-top: 0;">📅 PROGRAMME DES <span style="color:var(--accent)">CONVOIS</span></h1>
        <p style="color: #94a3b8;">Préparez vos moteurs, vérifiez vos pleins et rejoignez la flotte.</p>

        <div id="convoy-list" class="convoy-grid">
            </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="nav.js"></script>
    <script>
        const socket = io();
        const myName = localStorage.getItem('driverName');

        socket.emit('get_convoys');

        socket.on('receive_convoys', (convoys) => {
            const container = document.getElementById('convoy-list');
            if(convoys.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px; background: var(--card); border-radius: 20px;">
                        <p style="color: #94a3b8;">Aucun convoi prévu pour le moment. Repose-toi, chauffeur ! 💤</p>
                    </div>`;
                return;
            }

            container.innerHTML = convoys.map(c => {
                const dateC = new Date(c.date);
                const isParticipating = c.participants && c.participants.includes(myName);

                return `
                    <div class="convoy-card">
                        <div class="timer" data-time="${c.date}">Calcul...</div>
                        <span class="badge">🌐 ${c.server}</span>
                        <div class="route">${c.departureCity} ➔ ${c.arrivalCity}</div>
                        <div class="details">
                            📅 <strong>Le :</strong> ${dateC.toLocaleDateString('fr-FR', {day: 'numeric', month: 'long'})}<br>
                            ⏰ <strong>Départ :</strong> ${String(dateC.getHours()).padStart(2, '0')}h${String(dateC.getMinutes()).padStart(2, '0')}<br>
                            📝 <strong>Briefing :</strong> ${c.description || 'Aucune consigne particulière.'}
                        </div>
                        
                        <button class="btn-join ${isParticipating ? 'active' : ''}" onclick="toggleJoin('${c._id}')">
                            ${isParticipating ? '✅ JE PARTICIPE' : '✋ REJOINDRE LE CONVOI'}
                        </button>
                        
                        <div class="participants">
                            👥 ${c.participants ? c.participants.length : 0} chauffeur(s) inscrit(s)
                        </div>
                    </div>
                `;
            }).join('');

            startTimers();
        });

        function toggleJoin(convoyId) {
            socket.emit('toggle_convoy_participation', { convoyId, driverName: myName });
            // On rafraîchit pour voir le changement
            setTimeout(() => socket.emit('get_convoys'), 200);
        }

        function startTimers() {
            const update = () => {
                document.querySelectorAll('.timer').forEach(el => {
                    const target = new Date(el.getAttribute('data-time')).getTime();
                    const now = new Date().getTime();
                    const diff = target - now;

                    if (diff < 0) {
                        el.innerHTML = "🔴 DÉPART IMMINENT / EN COURS";
                        el.style.color = "#ef4444";
                    } else {
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);
                        el.innerHTML = `⏳ H-${h}h ${m}m ${s}s`;
                    }
                });
            };
            update();
            setInterval(update, 1000);
        }
    </script>
</body>
</html>
