<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prochains Convois - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #1e293b; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.5);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }

        /* --- STYLE NAVBAR --- */
        .main-nav {
            background: #0f172a;
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 1.2rem; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }
        .nav-links a.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-logout { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger);
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.8rem;
        }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* --- STYLE CONTENU --- */
        .container { padding: 40px; max-width: 1300px; margin: 0 auto; }
        .convoy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; margin-top: 30px; }
        
        .convoy-card { 
            background: var(--card); border-radius: 24px; padding: 30px; 
            border: 1px solid var(--border); border-left: 6px solid var(--accent);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .convoy-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .timer { font-family: 'JetBrains Mono'; color: var(--warning); font-size: 1rem; margin-bottom: 15px; font-weight: bold; background: rgba(245, 158, 11, 0.1); padding: 8px 12px; border-radius: 8px; display: inline-block; }
        .route { font-weight: 900; font-size: 1.4rem; margin: 15px 0; letter-spacing: -0.5px; }
        .details { font-size: 0.9rem; color: #94a3b8; line-height: 1.8; margin-bottom: 25px; }
        
        .badge { 
            background: rgba(59, 130, 246, 0.1); color: var(--accent); 
            padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800;
            text-transform: uppercase; border: 1px solid rgba(59, 130, 246, 0.2); float: right;
        }

        .btn-join {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: #334155; color: white; font-weight: 800; cursor: pointer;
            transition: 0.3s; font-size: 0.85rem; letter-spacing: 0.5px;
        }
        .btn-join.active { background: var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .btn-join:hover { background: var(--accent); }
        
        .participants { margin-top: 20px; font-size: 0.8rem; color: #64748b; display: flex; align-items: center; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-logo">VTC<span>OPS</span></div>
        <div class="nav-links">
            <a href="index.html">Tableau de bord</a>
            <a href="convoys.html" class="active">Convois</a>
            <a href="company.html">Bilan Financier</a>
            <a href="awards.html">Trophées</a>
        </div>
        <div class="nav-right">
            <button onclick="logout()" class="btn-logout">Déconnexion</button>
        </div>
    </nav>

    <div class="container">
        <h1 style="font-family: 'JetBrains Mono'; margin-top: 0;">📅 PROGRAMME DES <span style="color:var(--accent)">CONVOIS</span></h1>
        <p style="color: #94a3b8;">Rejoignez les sorties officielles de la compagnie et roulez en groupe.</p>

        <div id="convoy-list" class="convoy-grid">
            </div>
    </div>

    <script>
        const socket = io();
        const myName = localStorage.getItem('driverName');

        if (!myName) window.location.href = "login.html";

        function logout() {
            if(confirm("Voulez-vous vraiment vous déconnecter ?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        socket.emit('get_convoys');

        socket.on('receive_convoys', (convoys) => {
            const container = document.getElementById('convoy-list');
            if(!convoys || convoys.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; background: var(--card); border-radius: 24px; border: 1px dashed var(--border);">
                        <p style="color: #94a3b8; font-size: 1.1rem;">Aucun convoi n'est planifié pour le moment.</p>
                    </div>`;
                return;
            }

            container.innerHTML = convoys.map(c => {
                const dateC = new Date(c.date);
                const isParticipating = c.participants && c.participants.includes(myName);

                return `
                    <div class="convoy-card">
                        <span class="badge">🌐 ${c.server}</span>
                        <div class="timer" data-time="${c.date}">Calcul...</div>
                        <div class="route">${c.departureCity} ➔ ${c.arrivalCity}</div>
                        <div class="details">
                            📅 <strong>Date :</strong> ${dateC.toLocaleDateString('fr-FR', {day: 'numeric', month: 'long', year: 'numeric'})}<br>
                            ⏰ <strong>Départ :</strong> ${String(dateC.getHours()).padStart(2, '0')}h${String(dateC.getMinutes()).padStart(2, '0')}<br>
                            📝 <strong>Briefing :</strong> ${c.description || 'Pas de consignes.'}
                        </div>
                        
                        <button class="btn-join ${isParticipating ? 'active' : ''}" onclick="toggleJoin('${c._id}')">
                            ${isParticipating ? '✅ JE PARTICIPE' : '✋ REJOINDRE LE CONVOI'}
                        </button>
                        
                        <div class="participants">
                            👥 <strong>${c.participants ? c.participants.length : 0}</strong> chauffeur(s) inscrit(s)
                        </div>
                    </div>
                `;
            }).join('');

            startTimers();
        });

        function toggleJoin(convoyId) {
            socket.emit('toggle_convoy_participation', { convoyId, driverName: myName });
            setTimeout(() => socket.emit('get_convoys'), 200);
        }

        function startTimers() {
            const update = () => {
                document.querySelectorAll('.timer').forEach(el => {
                    const target = new Date(el.getAttribute('data-time')).getTime();
                    const now = new Date().getTime();
                    const diff = target - now;

                    if (diff < 0) {
                        el.innerHTML = "🔴 DÉPART IMMINENT";
                        el.style.color = "#ef4444";
                        el.style.background = "rgba(239, 68, 68, 0.1)";
                    } else {
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);
                        el.innerHTML = `⏳ H-${h}h ${m}m ${s}s`;
                    }
                });
            };
            update();
            setInterval(update, 1000);
        }
    </script>
</body>
</html>
