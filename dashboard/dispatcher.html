<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher VTC - Attribution des Contrats</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d1ff; --bg: #05070a; --card: #11141d; }
        body { 
            background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; padding: 40px;
            background-image: radial-gradient(circle, #11141d 1px, transparent 1px); background-size: 30px 30px;
        }
        .dispatch-container { max-width: 600px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--accent); border-radius: 15px; padding: 30px; box-shadow: 0 0 20px rgba(0,209,255,0.1); }
        h1 { font-family: 'Orbitron'; color: var(--accent); text-align: center; margin-bottom: 30px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #888; }
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; 
            border: 1px solid #333; background: #0d1117; color: white; font-size: 1.1rem;
        }
        button { 
            width: 100%; padding: 15px; background: var(--accent); color: black; 
            border: none; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
        }
        button:hover { filter: brightness(1.2); }
        .info { font-size: 0.8rem; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="dispatch-container">
        <h1>🛰️ DISPATCH CENTER</h1>

        <div class="card">
            <label>🔑 CODE ADMIN</label>
            <input type="password" id="d-pass" placeholder="Code secret...">

            <label>👤 CHAUFFEUR CONCERNÉ</label>
            <input type="text" id="d-target" placeholder="Pseudo exact...">

            <label>📍 DESTINATION ASSIGNÉE</label>
            <input type="text" id="d-city" placeholder="Ex: Paris, Berlin, Londres...">

            <label>📦 CARGAISON</label>
            <input type="text" id="d-cargo" placeholder="Ex: Matériel Médical, Voitures...">

            <button onclick="sendDispatch()">EMETTRE L'ORDRE DE MISSION</button>
            <p class="info">L'ordre s'affichera instantanément sur le dashboard du chauffeur.</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function sendDispatch() {
            const data = {
                target: document.getElementById('d-target').value,
                city: document.getElementById('d-city').value,
                cargo: document.getElementById('d-cargo').value,
                secret: document.getElementById('d-pass').value
            };

            if(!data.target || !data.city || !data.secret) return alert("Champs manquants !");

            // Envoi au serveur
            socket.emit('admin_dispatch_job', data);
            
            alert("Mission envoyée au chauffeur " + data.target);
            // On vide les champs sauf le pass
            document.getElementById('d-target').value = "";
            document.getElementById('d-city').value = "";
            document.getElementById('d-cargo').value = "";
        }
    </script>
</body>
</html>
