<!DOCTYPE html>
<html>
<head>
    <title>Dispatcher VTC</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { display: flex; height: 100vh; margin: 0; background: #0b0e14; color: white; font-family: sans-serif; }
        #side { width: 300px; padding: 20px; background: #11141d; }
        #map { flex-grow: 1; filter: invert(100%) hue-rotate(180deg); }
        textarea { width: 100%; height: 100px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="side">
        <h2>DISPATCH</h2>
        <textarea id="msg" placeholder="Message aux chauffeurs..."></textarea>
        <button onclick="send()">ENVOYER GLOBAL</button>
    </div>
    <div id="map"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const socket = io();
        const map = L.map('map').setView([48.85, 2.35], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        function send() {
            socket.emit('send_admin_message', { text: document.getElementById('msg').value });
            document.getElementById('msg').value = "";
        }
    </script>
</body>
</html>
