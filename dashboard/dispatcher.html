<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatcher Hub - VTC Ops Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: #1e293b;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at 20% 20%, #0f172a 0%, #020617 100%);
        }

        /* --- NAVIGATION --- */
        .main-nav {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 1.2rem; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }

        /* --- GLOBAL STATS STRIP --- */
        .stats-bar {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; padding: 25px 40px; background: rgba(30, 41, 59, 0.2);
        }
        .stat-card {
            background: rgba(2, 6, 23, 0.4); border: 1px solid var(--border);
            padding: 15px; border-radius: 16px; text-align: center;
        }
        .stat-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
        .stat-value { display: block; font-family: 'JetBrains Mono'; font-size: 1.3rem; font-weight: 800; margin-top: 5px; }

        /* --- LIVE MONITORING SECTION --- */
        .status-header { padding: 20px 40px; display: flex; align-items: center; gap: 15px; }
        .pulse-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--success); } 50% { opacity: 0.3; } }

        .dispatcher-grid { 
            display: grid; padding: 0 40px 40px;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; 
        }

        /* --- DRIVER CARDS --- */
        .driver-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 24px; 
            padding: 24px; position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }
        .driver-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .driver-card.warning { border-color: var(--warning); background: linear-gradient(135deg, #0f172a 0%, rgba(245, 158, 11, 0.05) 100%); }
        .driver-card.critical { border-color: var(--danger); background: linear-gradient(135deg, #0f172a 0%, rgba(239, 68, 68, 0.05) 100%); animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .driver-name { font-weight: 800; font-size: 1.2rem; color: white; }
        .truck-info { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-top: 4px; font-family: 'JetBrains Mono'; }

        .badge { font-size: 0.6rem; padding: 5px 12px; border-radius: 8px; font-weight: 900; }
        .badge-moving { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success); }
        .badge-idle { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid var(--warning); }

        .telemetry-box { background: rgba(0,0,0,0.25); border-radius: 16px; padding: 15px; margin-bottom: 20px; }
        .data-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 10px; }
        .data-row:last-child { margin-bottom: 0; }
        .data-label { color: var(--muted); }
        .data-value { font-family: 'JetBrains Mono'; font-weight: 700; }

        .progress-container { margin-top: 15px; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 800; margin-bottom: 8px; }
        .progress-bg { height: 10px; background: #1e293b; border-radius: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 1.5s ease-in-out; box-shadow: 0 0 15px var(--accent); }

        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .btn-action { 
            background: #1e293b; border: 1px solid var(--border); color: white; 
            padding: 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 800; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .btn-action:hover { background: var(--accent); border-color: var(--accent); }

        .btn-logout { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger);
            padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-logo">VTC<span>OPS</span> COMMAND</div>
        <div class="nav-links">
            <a href="dispatcher.html" class="active">Live Monitoring</a>
            <a href="company.html">Finances</a>
            <a href="convoys.html">Logistique</a>
        </div>
        <button onclick="logout()" class="btn-logout">OFFLINE</button>
    </nav>

    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-label">Unités Actives</span>
            <span class="stat-value" id="count-units" style="color: var(--accent)">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Jobs en Cours</span>
            <span class="stat-value" id="count-jobs" style="color: var(--success)">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Alertes Vitesse</span>
            <span class="stat-value" id="count-speed" style="color: var(--warning)">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Urgences Maint.</span>
            <span class="stat-value" id="count-dmg" style="color: var(--danger)">0</span>
        </div>
    </div>

    <div class="status-header">
        <div class="pulse-dot"></div>
        <div style="font-weight: 800; font-size: 0.9rem; letter-spacing: 1px;">FLOTTE EN TEMPS RÉEL</div>
    </div>

    <div class="dispatcher-grid" id="fleet-grid">
        </div>

    <script>
        const socket = io();

        function logout() {
            if(confirm("Confirmer la déconnexion du Command Center ?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        socket.on('update_leaderboard', (drivers) => {
            const grid = document.getElementById('fleet-grid');
            grid.innerHTML = "";
            
            let stats = { units: 0, jobs: 0, speed: 0, dmg: 0 };

            drivers.forEach(d => {
                const isOnline = d.lastUpdate && (new Date() - new Date(d.lastUpdate) < 120000);
                if (!isOnline) return;

                stats.units++;
                const damage = d.truck?.wearSum || 0;
                const speed = Math.round(d.truck?.speed || 0);
                const job = d.job;
                const progress = job?.plannedDistanceKm > 0 
                    ? Math.min(100, Math.max(0, ((job.plannedDistanceKm - job.remainingDistanceKm) / job.plannedDistanceKm) * 100))
                    : 0;

                if(speed > 90) stats.speed++;
                if(damage > 15) stats.dmg++;
                if(job?.cargo) stats.jobs++;

                const statusClass = damage > 20 ? 'critical' : (speed > 95 || damage > 10 ? 'warning' : '');

                const card = document.createElement('div');
                card.className = `driver-card ${statusClass}`;
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="driver-name">${d.name}</div>
                            <div class="truck-info">${d.truck?.brand || 'UNIT'} // ${d.truck?.model || 'X-SERIES'}</div>
                        </div>
                        <div class="badge ${speed > 2 ? 'badge-moving' : 'badge-idle'}">
                            ${speed > 2 ? 'EN TRANSIT' : 'À L\'ARRÊT'}
                        </div>
                    </div>

                    <div class="telemetry-box">
                        <div class="data-row">
                            <span class="data-label">Vélocité</span>
                            <span class="data-value" style="color:${speed > 90 ? 'var(--danger)' : 'var(--success)'}">${speed} KM/H</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Intégrité</span>
                            <span class="data-value" style="color:${damage > 10 ? 'var(--danger)' : 'var(--text)'}">${damage.toFixed(1)}%</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Cargaison</span>
                            <span class="data-value" style="max-width:150px; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                                ${job?.cargo || 'SANS OBJET'}
                            </span>
                        </div>
                    </div>

                    <div class="progress-container">
                        <div class="progress-labels">
                            <span>TO: ${job?.destinationCity || '---'}</span>
                            <span>${Math.round(progress)}%</span>
                        </div>
                        <div class="progress-bg">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>

                    <div class="card-actions">
                        <button class="btn-action" onclick="ping('${d.name}')">Signal 🔔</button>
                        <button class="btn-action" onclick="comms('${d.name}')">Comms 💬</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Mise à jour des compteurs globaux
            document.getElementById('count-units').innerText = stats.units;
            document.getElementById('count-jobs').innerText = stats.jobs;
            document.getElementById('count-speed').innerText = stats.speed;
            document.getElementById('count-dmg').innerText = stats.dmg;
        });

        function ping(name) {
            socket.emit('send_private_flash', { name, message: "⚠️ CONTACT DISPATCH : Vérifiez votre console !", type: "warning" });
        }

        function comms(name) {
            const msg = prompt(`Message direct pour ${name} :`);
            if(msg) socket.emit('send_private_flash', { name, message: "📩 DISPATCH : " + msg, type: "info" });
        }
    </script>
</body>
</html>
