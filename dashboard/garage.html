<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Garage de la Flotte - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --border: #334155; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        .container { padding: 40px; max-width: 1400px; margin: 0 auto; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Filtres */
        .filter-group { display: flex; gap: 10px; background: #0f172a; padding: 5px; border-radius: 12px; border: 1px solid var(--border); }
        .filter-btn { 
            background: transparent; border: none; color: #94a3b8; padding: 8px 15px; 
            border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: 0.2s;
        }
        .filter-btn.active { background: var(--accent); color: white; }

        .garage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .truck-card { 
            background: var(--card); border-radius: 20px; overflow: hidden; 
            border: 1px solid var(--border); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .truck-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .truck-img { width: 100%; height: 200px; object-fit: cover; background: #0f172a; border-bottom: 1px solid var(--border); }
        
        .truck-info { padding: 25px; }
        .truck-brand { color: var(--accent); font-family: 'JetBrains Mono'; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .truck-model { font-size: 1.3rem; font-weight: 900; margin: 5px 0 15px 0; }
        
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .spec-item { display: flex; flex-direction: column; }
        .spec-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; }
        .spec-val { font-size: 0.9rem; font-weight: 700; margin-top: 3px; }
        
        .status-badge { 
            position: absolute; top: 15px; right: 15px; padding: 6px 14px; border-radius: 50px; 
            font-size: 0.65rem; font-weight: 900; text-transform: uppercase; backdrop-filter: blur(10px);
        }
        .status-online { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-busy { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }

        /* Barre d'état moteur */
        .health-bar-container { height: 4px; background: #0f172a; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .health-bar { height: 100%; background: var(--accent); transition: width 0.5s; }
    </style>
</head>
<body>

    <script src="nav.js"></script>

    <div class="container">
        <div class="header-flex">
            <div>
                <h1 style="font-family: 'JetBrains Mono'; margin: 0;">🚛 GARAGE <span style="color:var(--accent)">OFFICIEL</span></h1>
                <p style="color: #94a3b8; margin: 5px 0 0 0;">État de la flotte et assignations en temps réel.</p>
            </div>

            <div class="filter-group">
                <button class="filter-btn active" onclick="filterTrucks('all', this)">Tous</button>
                <button class="filter-btn" onclick="filterTrucks('Disponible', this)">Libres</button>
                <button class="filter-btn" onclick="filterTrucks('En Mission', this)">En Mission</button>
            </div>
        </div>

        <div id="truck-list" class="garage-grid">
            </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let allTrucks = [];

        socket.emit('get_trucks');

        socket.on('receive_trucks', (trucks) => {
            allTrucks = trucks;
            renderTrucks(allTrucks);
        });

        function renderTrucks(list) {
            const container = document.getElementById('truck-list');
            if(list.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">Aucun camion ne correspond à ce critère.</p>`;
                return;
            }

            container.innerHTML = list.map(t => {
                const health = t.condition || 100; // Si tu as un champ condition dans ta DB
                return `
                <div class="truck-card">
                    <div class="status-badge ${t.status === 'Disponible' ? 'status-online' : 'status-busy'}">
                        ${t.status}
                    </div>
                    <img src="${t.image || 'https://images.unsplash.com/photo-1586191582151-f73872dfd183?auto=format&fit=crop&q=80&w=400'}" class="truck-img">
                    <div class="truck-info">
                        <div class="truck-brand">${t.brand}</div>
                        <div class="truck-model">${t.model}</div>
                        
                        <div class="specs">
                            <div class="spec-item">
                                <span class="spec-label">Puissance</span>
                                <span class="spec-val">⚡ ${t.power} CV</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Assigné à</span>
                                <span class="spec-val" style="color: ${t.assignedTo === 'Libre' ? 'var(--text)' : 'var(--accent)'}">
                                    👤 ${t.assignedTo}
                                </span>
                            </div>
                        </div>

                        <div class="health-bar-container">
                            <div class="health-bar" style="width: ${health}%; background: ${health < 30 ? 'var(--danger, #ef4444)' : 'var(--accent)'}"></div>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-top:5px;">
                             <span style="font-size:0.6rem; color:#64748b;">ÉTAT GÉNÉRAL</span>
                             <span style="font-size:0.6rem; font-weight:bold;">${health}%</span>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function filterTrucks(status, btn) {
            // Update UI boutons
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if(status === 'all') {
                renderTrucks(allTrucks);
            } else {
                const filtered = allTrucks.filter(t => t.status === status);
                renderTrucks(filtered);
            }
        }
    </script>
</body>
</html>
