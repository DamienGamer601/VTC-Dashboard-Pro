<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage de la Flotte - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/nav.js"></script> <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.4);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0;
            background-image: radial-gradient(circle at top left, #1e293b, #020617);
            min-height: 100vh;
        }

        .container { padding: 40px; max-width: 1400px; margin: 0 auto; }
        
        .header-flex { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            margin-bottom: 40px; border-left: 4px solid var(--accent); padding-left: 20px;
        }
        
        /* Filtres Style "Glass" */
        .filter-group { 
            display: flex; gap: 8px; background: rgba(15, 23, 42, 0.6); 
            padding: 6px; border-radius: 14px; border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .filter-btn { 
            background: transparent; border: none; color: var(--muted); padding: 10px 20px; 
            border-radius: 10px; cursor: pointer; font-size: 0.75rem; font-weight: 800; 
            transition: 0.3s; text-transform: uppercase;
        }
        .filter-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        /* Grille des camions */
        .garage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
        
        .truck-card { 
            background: var(--card); border-radius: 24px; overflow: hidden; 
            border: 1px solid var(--border); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .truck-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .truck-img { 
            width: 100%; height: 220px; object-fit: cover; 
            background: #0c1120; border-bottom: 1px solid var(--border);
            filter: grayscale(0.3); transition: 0.5s;
        }
        .truck-card:hover .truck-img { filter: grayscale(0); transform: scale(1.05); }
        
        .truck-info { padding: 25px; }
        .truck-brand { color: var(--accent); font-family: 'JetBrains Mono'; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .truck-model { font-size: 1.5rem; font-weight: 900; margin: 5px 0 20px 0; letter-spacing: -0.5px; }
        
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .spec-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px;}
        .spec-val { font-size: 0.95rem; font-weight: 800; font-family: 'JetBrains Mono'; }
        
        .status-badge { 
            position: absolute; top: 15px; right: 15px; padding: 8px 16px; border-radius: 12px; 
            font-size: 0.7rem; font-weight: 900; text-transform: uppercase; backdrop-filter: blur(12px);
            z-index: 10; border: 1px solid rgba(255,255,255,0.1);
        }
        .status-online { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-busy { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

        .health-container { margin-top: 25px; }
        .health-bar-bg { height: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .health-bar-fill { height: 100%; transition: width 1s ease-out; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-flex">
            <div>
                <h1 style="font-family: 'JetBrains Mono'; margin: 0; font-size: 2.2rem; letter-spacing: -1px;">CENTRE <span style="color:var(--accent)">TECHNIQUE</span></h1>
                <p style="color: var(--muted); margin: 5px 0 0 0; font-weight: 600;">État de santé et disponibilité des unités de transport.</p>
            </div>

            <div class="filter-group">
                <button class="filter-btn active" onclick="filterTrucks('all', this)">Tous</button>
                <button class="filter-btn" onclick="filterTrucks('Disponible', this)">Libres</button>
                <button class="filter-btn" onclick="filterTrucks('En Mission', this)">En Service</button>
            </div>
        </div>

        <div id="truck-list" class="garage-grid">
            </div>
    </div>

    <script>
        const socket = io();
        let allTrucks = [];

        // Récupération initiale
        socket.emit('get_trucks');

        socket.on('receive_trucks', (trucks) => {
            allTrucks = trucks;
            renderTrucks(allTrucks);
        });

        function renderTrucks(list) {
            const container = document.getElementById('truck-list');
            if(list.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--muted); background: var(--card); border-radius: 30px; border: 1px dashed var(--border);">
                    <div style="font-size: 3rem; margin-bottom: 20px;">🚜</div>
                    <div style="font-weight: 800; font-size: 1.2rem;">Aucun véhicule trouvé</div>
                </div>`;
                return;
            }

            container.innerHTML = list.map(t => {
                const health = t.condition || 100;
                const statusClass = t.status === 'Disponible' ? 'status-online' : 'status-busy';
                const healthColor = health < 30 ? 'var(--danger)' : health < 70 ? 'var(--warning)' : 'var(--success)';
                
                return `
                <div class="truck-card">
                    <div class="status-badge ${statusClass}">
                        ${t.status}
                    </div>
                    <img src="${t.image || 'https://images.unsplash.com/photo-1591768793355-74d7c807051a?q=80&w=400'}" class="truck-img" alt="Truck">
                    <div class="truck-info">
                        <div class="truck-brand">${t.brand || 'SCANIA'}</div>
                        <div class="truck-model">${t.model || 'S730 Highline'}</div>
                        
                        <div class="specs">
                            <div class="spec-item">
                                <span class="spec-label">Puissance</span>
                                <span class="spec-val">⚡ ${t.power || '---'} CV</span>
                            </div>
                            <div class="spec-item">
                                <span class="spec-label">Opérateur</span>
                                <span class="spec-val" style="color: ${t.assignedTo === 'Libre' ? 'var(--muted)' : 'var(--accent)'}">
                                    👤 ${t.assignedTo || 'Libre'}
                                </span>
                            </div>
                        </div>

                        <div class="health-container">
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                <span style="font-size:0.6rem; color:var(--muted); font-weight:800; text-transform:uppercase;">Intégrité Structurelle</span>
                                <span style="font-size:0.7rem; font-weight:900; font-family:'JetBrains Mono'; color:${healthColor}">${health}%</span>
                            </div>
                            <div class="health-bar-bg">
                                <div class="health-bar-fill" style="width: ${health}%; background: ${healthColor}"></div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function filterTrucks(status, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if(status === 'all') {
                renderTrucks(allTrucks);
            } else {
                const filtered = allTrucks.filter(t => t.status === status);
                renderTrucks(filtered);
            }
        }
    </script>
</body>
</html>
