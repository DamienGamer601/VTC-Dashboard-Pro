<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTC Dashboard - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080a0f; --card: #11141d; --accent: #00d1ff; --text: #e6edf3; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #11141d 0%, #080a0f 100%); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .login-box { display: flex; flex-direction: column; align-items: center; padding: 40px; border: 2px solid var(--accent); border-radius: 15px; background: rgba(17, 20, 29, 0.95); animation: fadeIn 1.2s ease-out; }
        .main-container { display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; padding: 20px; }
        .widget { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #252a37; text-align: center; }
        .speed-value { font-family: 'Orbitron'; font-size: 5rem; color: var(--accent); }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.png" style="width: 220px; margin-bottom: 25px; filter: drop-shadow(0 0 10px var(--accent));">
            <h1 style="font-family:'Orbitron'; color:var(--accent);">ACCÈS CHAUFFEUR</h1>
            <input type="text" id="username-input" placeholder="Pseudo..." style="padding:15px; border-radius:8px; text-align:center; margin-bottom: 15px;">
            <button onclick="login()" style="padding:12px 40px; background:var(--accent); cursor:pointer; font-family:'Orbitron'; font-weight:bold;">LANCER LE MOTEUR</button>
        </div>
    </div>

    <div class="main-container">
        <div class="side">
            <div class="widget"><h3>CARBURANT</h3><div id="fuel">-- L</div></div>
        </div>
        <div class="center">
            <div style="text-align:center; color:var(--accent);">UNITÉ : <span id="current-driver">---</span></div>
            <div class="widget"><div class="speed-value" id="speed">0</div>KM/H</div>
        </div>
        <div class="side">
            <div class="widget"><h3>DÉGÂTS</h3><div id="damage" style="color:red;">0%</div></div>
            <button onclick="logout()" style="margin-top:20px; width:100%; background:none; color:gray; cursor:pointer;">Déconnexion</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        window.onload = () => {
            const name = localStorage.getItem('driverName');
            if(name) { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('current-driver').innerText = name.toUpperCase(); }
        };
        function login() { 
            const name = document.getElementById('username-input').value;
            if(name.length > 2) { localStorage.setItem('driverName', name); location.reload(); }
        }
        function logout() { localStorage.removeItem('driverName'); location.reload(); }

        socket.on('update_dashboard', (data) => {
            document.getElementById('speed').innerText = data.truck.speed;
            document.getElementById('fuel').innerText = Math.round(data.truck.fuel) + " L";
            document.getElementById('damage').innerText = Math.round(data.truck.wearSum) + "%";
        });

        socket.on('receive_flash', (msg) => {
            const flash = document.createElement('div');
            flash.style = "position:fixed; top:20px; left:50%; transform:translateX(-50%); background:red; color:white; padding:20px; font-weight:bold; z-index:9999;";
            flash.innerText = "⚠️ ALERTE ADMIN : " + msg;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 10000);
        });
    </script>
</body>
</html>
