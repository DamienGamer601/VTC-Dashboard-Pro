<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Manager - Dashboard Professionnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f8fafc; 
            --sidebar: #0f172a; 
            --card: #ffffff; 
            --accent: #2563eb; 
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body { 
            background: var(--bg);
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: white;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar h2 { 
            font-size: 0.9rem; 
            font-weight: 700; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 40px;
        }

        /* Main Area */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            padding-bottom: 15px; 
            border-bottom: 1px solid var(--border);
        }

        .driver-tag { 
            background: #e2e8f0; 
            padding: 6px 15px; 
            border-radius: 6px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: var(--text-main);
        }

        /* Widgets & Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .card { 
            background: var(--card); 
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid var(--border); 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
        }

        /* Speed Display */
        .speed-card { text-align: center; padding: 50px 20px; margin-bottom: 25px; }
        .speed-value { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 6rem; 
            font-weight: 700; 
            color: var(--text-main); 
            line-height: 1;
        }
        .speed-unit { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 2px; }

        /* Status Badges */
        .status-badge { 
            padding: 5px 12px; 
            border-radius: 4px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            background: #f1f5f9; 
            color: #94a3b8;
            margin-left: 10px;
        }
        .active-parking { background: #fee2e2; color: #dc2626; }
        .active-cruise { background: #dcfce7; color: #16a34a; }

        /* Indicators Bars */
        .bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; color: #94a3b8; }
        .bar-bg { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; margin-bottom: 25px; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.4s ease; }

        /* Buttons */
        .btn { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
            font-family: 'Inter';
            margin-bottom: 10px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-outline:hover { background: #f8fafc; color: var(--text-main); }
        .btn-logout { margin-top: auto; background: transparent; color: #ef4444; border: 1px solid #450a0a; }

        #alert-banner { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; right: 0; 
            background: var(--sidebar); 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-weight: 600; 
            z-index: 1000;
            border-bottom: 3px solid var(--accent);
        }
    </style>
</head>
<body>

    <div id="alert-banner"></div>

    <div class="sidebar">
        <h2>Fleet Ops v4</h2>
        
        <div class="sidebar-stats">
            <div class="bar-label">RÉSERVOIR</div>
            <div id="side-fuel-val" style="color:white; font-family:'JetBrains Mono'; margin-bottom:5px;">-- L</div>
            <div class="bar-bg"><div id="fuel-bar" class="bar-fill" style="background: var(--success);"></div></div>

            <div class="bar-label">ÉTAT MÉCANIQUE</div>
            <div id="side-damage-val" style="color:white; font-family:'JetBrains Mono'; margin-bottom:5px;">0%</div>
            <div class="bar-bg"><div id="damage-bar" class="bar-fill" style="background: var(--danger);"></div></div>
        </div>

        <button class="btn btn-outline" onclick="window.location.href='leaderboard.html'" style="margin-top:20px; border-color:#334155; color:white;">🏆 CLASSEMENT</button>
        
        <button class="btn btn-outline" onclick="checkAdminAccess()" style="border-color:#334155; color:#94a3b8;">⚙️ ADMINISTRATION</button>

        <button class="btn btn-logout" onclick="logout()">LOGOUT</button>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="driver-tag">CHAUFFEUR : <span id="driver-name">---</span></div>
            <div>
                <span id="badge-p" class="status-badge">PARK</span>
                <span id="badge-c" class="status-badge">CRUISE</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card">
                <div class="bar-label">SOLDE ACTUEL</div>
                <div id="wallet" style="font-size: 1.5rem; font-weight: 700; color: var(--success);">0.00 €</div>
            </div>
            <div class="card">
                <div class="bar-label">DISTANCE TOTALE</div>
                <div id="odometer" style="font-size: 1.5rem; font-weight: 700;">0 KM</div>
            </div>
            <div class="card">
                <div class="bar-label">TRANSMISSION</div>
                <div id="gear-box" style="font-size: 1.5rem; font-weight: 700;">N</div>
            </div>
        </div>

        <div class="card speed-card">
            <div class="speed-unit">Vitesse Réelle</div>
            <div id="speed" class="speed-value">0</div>
            <div class="speed-unit">Kilomètres / Heure</div>
        </div>

        <div class="card">
            <button class="btn btn-primary" onclick="window.location.href='profile.html?user='+localStorage.getItem('vtcName')">VOIR MON PROFIL PUBLIC</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const user = localStorage.getItem('vtcName');

        if (!user) { window.location.href = "login.html"; }
        else { document.getElementById('driver-name').innerText = user.toUpperCase(); }

        // --- FONCTION ACCÈS ADMIN ---
        function checkAdminAccess() {
            const code = prompt("Veuillez saisir le code d'accès administrateur :");
            if (code === "DAMIAN_VTC_2024") {
                window.location.href = 'admin.html';
            } else if (code !== null) {
                alert("⚠️ Accès refusé : Code incorrect.");
            }
        }

        socket.on('update_dashboard', (data) => {
            document.getElementById('speed').innerText = data.truck.speed;
            const gear = data.truck.displayedGear;
            document.getElementById('gear-box').innerText = gear > 0 ? 'D' + gear : (gear < 0 ? 'R' : 'N');
            
            document.getElementById('badge-p').className = data.truck.parkBrakeOn ? 'status-badge active-parking' : 'status-badge';
            document.getElementById('badge-c').className = data.truck.cruiseControlOn ? 'status-badge active-cruise' : 'status-badge';

            document.getElementById('odometer').innerText = Math.round(data.totalKM) + " KM";
            document.getElementById('wallet').innerText = data.wallet.toLocaleString() + " €";
            
            const fuelPct = (data.truck.fuel / (data.truck.fuelCapacity || 400)) * 100;
            document.getElementById('fuel-bar').style.width = fuelPct + "%";
            document.getElementById('side-fuel-val').innerText = Math.round(data.truck.fuel) + " L";
            
            document.getElementById('damage-bar').style.width = data.truck.wearSum + "%";
            document.getElementById('side-damage-val').innerText = Math.round(data.truck.wearSum) + "%";
        });

        socket.on('receive_flash', (msg) => {
            const banner = document.getElementById('alert-banner');
            banner.innerText = "🚨 NOTE DE SERVICE : " + msg;
            banner.style.display = 'block';
            setTimeout(() => banner.style.display = 'none', 8000);
        });

        function logout() {
            localStorage.removeItem('vtcName');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
