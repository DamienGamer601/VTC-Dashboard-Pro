<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes Factures - VTC Ops</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #1e293b; --text: #f8fafc; 
            --accent: #3b82f6; --success: #10b981; --danger: #ef4444; 
            --border: rgba(51, 65, 85, 0.5); --muted: #94a3b8;
        }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
        }

        /* --- NAVBAR --- */
        .main-nav {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 12px 30px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 1.2rem; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* --- RÉSUMÉ COMPTABLE --- */
        .accounting-summary { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; margin-bottom: 40px; 
        }
        .summary-card { 
            background: rgba(30, 41, 59, 0.4); padding: 25px; border-radius: 24px; 
            border: 1px solid var(--border); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center;
        }
        .summary-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 8px; }
        .summary-val { font-size: 2rem; font-weight: 900; font-family: 'JetBrains Mono'; }

        /* --- TABLEAU DE TRANSACTIONS --- */
        .invoice-wrapper { 
            background: rgba(15, 23, 42, 0.6); border-radius: 28px; 
            border: 1px solid var(--border); overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .invoice-table { width: 100%; border-collapse: collapse; }
        
        th { 
            background: rgba(15, 23, 42, 0.8); padding: 20px; 
            text-align: left; font-size: 0.7rem; color: var(--muted); 
            text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border);
        }
        td { padding: 18px 20px; border-bottom: 1px solid rgba(51, 65, 85, 0.3); font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255,255,255,0.03); }
        
        .amount-pos { color: var(--success); font-weight: 800; }
        .amount-neg { color: var(--danger); font-weight: 800; }
        
        .type-pill { 
            padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; 
            letter-spacing: 1px; display: inline-block; text-transform: uppercase;
        }
        
        .empty-state { padding: 80px; text-align: center; color: var(--muted); font-weight: 600; }
        
        /* Animation pour les chiffres */
        .summary-card .summary-val { transition: 0.5s ease-out; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-logo">VTC<span>OPS</span></div>
        <div class="nav-links">
            <a href="index.html">Tableau de bord</a>
            <a href="garage.html">Garage</a>
            <a href="convoys.html">Convois</a>
            <a href="invoices.html" style="color: var(--accent)">Comptabilité</a>
        </div>
        <div id="driver-display" style="font-weight: 800; font-size: 0.75rem; color: var(--muted)">CHAUFFEUR</div>
    </nav>

    <div class="container">
        <h1 style="font-family: 'JetBrains Mono'; font-weight: 900; font-size: 2.2rem; margin-bottom: 35px; letter-spacing: -1px;">
            LIVRE DE <span style="color:var(--accent)">COMPTES</span>
        </h1>

        <div class="accounting-summary">
            <div class="summary-card">
                <div class="summary-label">Revenus Logistiques</div>
                <div class="summary-val" id="total-revenue" style="color: var(--success)">0 €</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">Charges & Maintenance</div>
                <div class="summary-val" id="total-expenses" style="color: var(--danger)">0 €</div>
            </div>
            <div class="summary-card" style="border-color: var(--accent); background: rgba(59, 130, 246, 0.05);">
                <div class="summary-label" style="color: var(--accent)">Bénéfice Net Actuel</div>
                <div class="summary-val" id="net-profit">0 €</div>
            </div>
        </div>

        <div class="invoice-wrapper">
            <table class="invoice-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Catégorie</th>
                        <th>Désignation de la transaction</th>
                        <th style="text-align: right;">Montant (EUR)</th>
                    </tr>
                </thead>
                <tbody id="invoice-body">
                    </tbody>
            </table>
            <div id="empty-msg" class="empty-state" style="display:none;">
                <div style="font-size: 3rem; margin-bottom: 15px;">🔍</div>
                Aucune transaction enregistrée dans le grand livre.
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const myName = localStorage.getItem('driverName') || "Invité";
        document.getElementById('driver-display').innerText = myName.toUpperCase();

        socket.emit('get_my_invoices', myName);

        socket.on('receive_invoices', (data) => {
            const container = document.getElementById('invoice-body');
            const emptyMsg = document.getElementById('empty-msg');
            
            if (!data || data.length === 0) {
                container.innerHTML = "";
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';
            let rev = 0;
            let exp = 0;

            // Tri par date décroissante (plus récent en haut)
            const sortedData = [...data].reverse();

            container.innerHTML = sortedData.map(tx => {
                const isRevenue = tx.type === 'REVENUE' || tx.amount > 0;
                if(isRevenue) rev += tx.amount; else exp += Math.abs(tx.amount);

                return `
                <tr>
                    <td style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--muted);">
                        ${new Date(tx.date).toLocaleDateString('fr-FR')}
                    </td>
                    <td>
                        <span class="type-pill" style="background:${isRevenue ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; color:${isRevenue ? 'var(--success)' : 'var(--danger)'}">
                            ${tx.type}
                        </span>
                    </td>
                    <td style="font-weight: 600; color: #e2e8f0;">${tx.reason}</td>
                    <td class="${isRevenue ? 'amount-pos' : 'amount-neg'}" style="text-align: right; font-family: 'JetBrains Mono'; font-size: 1.05rem;">
                        ${isRevenue ? '+' : '-'}${Math.abs(tx.amount).toLocaleString()} €
                    </td>
                </tr>
            `;}).join('');

            // Mise à jour du résumé avec animation simple
            document.getElementById('total-revenue').innerText = rev.toLocaleString() + " €";
            document.getElementById('total-expenses').innerText = exp.toLocaleString() + " €";
            const net = rev - exp;
            const netEl = document.getElementById('net-profit');
            netEl.innerText = net.toLocaleString() + " €";
            netEl.style.color = net >= 0 ? "var(--success)" : "var(--danger)";
        });
    </script>
</body>
</html>
