<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classement des Chauffeurs - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #94a3b8; --border: #334155;
            --gold: #f59e0b; --silver: #94a3b8; --bronze: #b45309;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 1100px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { font-size: 1.8rem; letter-spacing: -1px; }

        .btn-back { background: transparent; border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .btn-back:hover { background: var(--border); }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        th { background: #16213e; padding: 18px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--accent); letter-spacing: 1.5px; font-weight: 700; }
        td { padding: 18px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #262f45; transition: 0.2s; }

        /* Styles spécifiques aux colonnes */
        .pos-1 { color: var(--gold); font-weight: 800; }
        .pos-2 { color: var(--silver); font-weight: 800; }
        .pos-3 { color: var(--bronze); font-weight: 800; }

        .rank-tag { padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: white; display: inline-block; }
        .xp-val { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent); }
        .money-val { color: #10b981; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .job-val { font-style: italic; color: var(--muted); font-size: 0.8rem; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🏆 CLASSEMENT GÉNÉRAL</h1>
            <a href="index.html" class="btn-back">⬅ RETOUR DASHBOARD</a>
        </header>

        

        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">Pos</th>
                    <th>Chauffeur</th>
                    <th>Rang</th>
                    <th>Expérience</th>
                    <th>Dernière Mission</th>
                    <th>Solde Compte</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Système de calcul des rangs (Identique au Dashboard pour la cohérence)
        function getRankInfo(xp) {
            if (xp < 500) return { name: "Stagiaire", color: "#64748b" };
            if (xp < 2000) return { name: "Chauffeur Pro", color: "#2563eb" };
            if (xp < 5000) return { name: "Expert Route", color: "#10b981" };
            return { name: "Légende VTC", color: "#f59e0b" };
        }

        socket.on('update_leaderboard', (drivers) => {
            const body = document.getElementById('leaderboard-body');
            body.innerHTML = "";

            // Tri par XP décroissante (Le plus haut en premier)
            drivers.sort((a, b) => (b.experience || 0) - (a.experience || 0));

            drivers.forEach((driver, index) => {
                const rank = getRankInfo(driver.experience || 0);
                const posClass = index === 0 ? "pos-1" : (index === 1 ? "pos-2" : (index === 2 ? "pos-3" : ""));
                
                const row = `
                    <tr>
                        <td class="${posClass}">${index + 1}</td>
                        <td style="font-weight: 700; letter-spacing: 0.5px;">${driver.name.toUpperCase()}</td>
                        <td><span class="rank-tag" style="background:${rank.color}">${rank.name}</span></td>
                        <td class="xp-val">${Math.round(driver.experience || 0)} XP</td>
                        <td class="job-val">${driver.lastJob || "En attente..."}</td>
                        <td class="money-val">${driver.wallet.toLocaleString()} €</td>
                    </tr>
                `;
                body.innerHTML += row;
            });
        });
    </script>
</body>
</html>
