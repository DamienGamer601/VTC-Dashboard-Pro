<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classement - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/nav.js"></script> <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.4);
            --gold: #fbbf24; --silver: #94a3b8; --bronze: #d97706;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-image: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        /* --- PODIUM --- */
        .podium {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 20px; margin-bottom: 60px; padding-top: 40px;
        }

        .podium-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px 20px 0 0; display: flex; flex-direction: column;
            align-items: center; padding: 20px; width: 200px; position: relative;
            transition: 0.3s;
        }

        .podium-item:hover { transform: translateY(-5px); border-color: var(--accent); }

        .rank-icon {
            font-size: 2rem; position: absolute; top: -30px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .podium-2 { height: 180px; order: 1; border-top: 4px solid var(--silver); }
        .podium-1 { height: 230px; order: 2; border-top: 4px solid var(--gold); box-shadow: 0 0 30px rgba(251, 191, 36, 0.1); }
        .podium-3 { height: 150px; order: 3; border-top: 4px solid var(--bronze); }

        .podium-name { font-weight: 800; font-size: 1.1rem; margin-top: 10px; }
        .podium-score { color: var(--accent); font-family: 'JetBrains Mono'; font-size: 0.9rem; }

        /* --- TABLEAU --- */
        .leaderboard-table {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.02); padding: 15px; text-align: left; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .rank-number { font-family: 'JetBrains Mono'; font-weight: 800; color: var(--muted); width: 50px; }
        .driver-info { display: flex; align-items: center; gap: 12px; }
        .driver-avatar { width: 35px; height: 35px; background: var(--bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 1px solid var(--border); }

        .stat-value { font-family: 'JetBrains Mono'; font-weight: 700; color: var(--success); }
        
        .highlight { background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-family: 'JetBrains Mono'; font-size: 2.5rem; margin: 0;">TOP <span style="color:var(--accent)">100</span></h1>
            <p style="color: var(--muted);">Les meilleurs chauffeurs de la flotte VTC OPS</p>
        </header>

        <div id="podium-container" class="podium">
            </div>

        <div class="leaderboard-table">
            <table id="full-ranking">
                <thead>
                    <tr>
                        <th>Rang</th>
                        <th>Chauffeur</th>
                        <th>Distance Totale</th>
                        <th>Expérience</th>
                        <th>Portefeuille</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const socket = io();

        // On demande les données au serveur
        socket.emit('get_admin_data'); 

        socket.on('receive_admin_data', (data) => {
            // On trie les chauffeurs par portefeuille (ou expérience)
            const sortedDrivers = data.drivers.sort((a, b) => b.wallet - a.wallet);
            
            renderPodium(sortedDrivers.slice(0, 3));
            renderTable(sortedDrivers);
        });

        function renderPodium(top3) {
            const container = document.getElementById('podium-container');
            container.innerHTML = '';
            
            const medals = ['🥇', '🥈', '🥉'];
            const classes = ['podium-1', 'podium-2', 'podium-3'];

            // On réorganise pour l'affichage visuel (2 - 1 - 3)
            const displayOrder = [top3[1], top3[0], top3[2]];

            displayOrder.forEach((driver, index) => {
                if(!driver) return;
                
                // On retrouve le vrai rang pour la médaille
                const realRank = top3.indexOf(driver); 
                
                container.innerHTML += `
                    <div class="podium-item ${classes[realRank]}">
                        <div class="rank-icon">${medals[realRank]}</div>
                        <div class="driver-avatar" style="width:50px; height:50px; font-size:1.2rem; margin-bottom:10px;">${driver.name[0]}</div>
                        <div class="podium-name">${driver.name}</div>
                        <div class="podium-score">${Math.round(driver.wallet)} €</div>
                    </div>
                `;
            });
        }

        function renderTable(drivers) {
            const tbody = document.querySelector('#full-ranking tbody');
            tbody.innerHTML = '';
            const myName = localStorage.getItem('driverName');

            drivers.forEach((driver, index) => {
                const isMe = driver.name === myName;
                tbody.innerHTML += `
                    <tr class="${isMe ? 'highlight' : ''}">
                        <td class="rank-number">#${index + 1}</td>
                        <td>
                            <div class="driver-info">
                                <div class="driver-avatar">${driver.name[0]}</div>
                                <div style="font-weight:700;">${driver.name} ${isMe ? '<small>(Vous)</small>' : ''}</div>
                            </div>
                        </td>
                        <td>${Math.round(driver.distance)} km</td>
                        <td>${Math.round(driver.experience)} XP</td>
                        <td class="stat-value">${Math.round(driver.wallet).toLocaleString()} €</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
