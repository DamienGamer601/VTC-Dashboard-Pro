<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal de Bord - VTC Ops</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #94a3b8; --border: rgba(51, 65, 85, 0.5);
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
        }

        /* --- NAVBAR --- */
        .main-nav {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 12px 30px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-logo { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 1.2rem; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* HEADER & STATS */
        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        h1 { font-family: 'JetBrains Mono'; font-size: 2.5rem; margin: 0; letter-spacing: -2px; font-weight: 900; }
        
        .stats-summary { display: flex; gap: 20px; }
        .stat-card { 
            background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border); 
            padding: 20px 30px; border-radius: 20px; min-width: 200px; backdrop-filter: blur(10px);
        }
        .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; font-weight: 800; }
        .stat-val { font-family: 'JetBrains Mono'; font-size: 1.6rem; font-weight: 900; }

        /* FILTRES */
        .filter-bar { display: flex; gap: 12px; margin-bottom: 30px; }
        .filter-btn { 
            background: rgba(30, 41, 59, 0.6); border: 1px solid var(--border); color: var(--muted);
            padding: 10px 20px; border-radius: 12px; font-size: 0.75rem; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .filter-btn:hover { border-color: var(--accent); color: white; background: rgba(59, 130, 246, 0.1); }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }

        /* LOG TABLE */
        .log-wrapper { 
            background: rgba(15, 23, 42, 0.6); border-radius: 30px; border: 1px solid var(--border); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); overflow: hidden; backdrop-filter: blur(10px);
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 22px; background: rgba(15, 23, 42, 0.9); color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; border-bottom: 1px solid var(--border); }
        td { padding: 20px 22px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        /* TAGS & AMOUNTS */
        .tag { padding: 6px 12px; border-radius: 8px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; display: inline-block; letter-spacing: 0.5px; }
        .tag-delivery { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .tag-bonus { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.2); }
        .tag-fine { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .tag-maintenance { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }

        .amount { font-family: 'JetBrains Mono'; font-weight: 800; text-align: right; font-size: 1.1rem; }
        .pos { color: var(--success); }
        .neg { color: var(--danger); }

        .footer-action { margin-top: 40px; text-align: center; }
        .btn-back { 
            display: inline-flex; align-items: center; gap: 10px; 
            color: var(--muted); text-decoration: none; font-size: 0.8rem; font-weight: 800;
            padding: 15px 25px; border: 1px solid var(--border); border-radius: 15px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-back:hover { background: #fff; color: #000; border-color: #fff; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-logo">VTC<span>OPS</span></div>
        <div class="nav-links">
            <a href="index.html">Tableau de bord</a>
            <a href="garage.html">Garage</a>
            <a href="leaderboard.html">Hall of Fame</a>
            <a href="logbook.html" style="color: var(--accent)">Logbook</a>
        </div>
        <div id="driver-display" style="font-size: 0.75rem; font-weight: 800; color: var(--muted);">---</div>
    </nav>

    <div class="container">
        <div class="header-flex">
            <div>
                <div style="color: var(--accent); font-weight: 900; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px;">Boîte Noire Télémétrique</div>
                <h1>LOGBOOK</h1>
            </div>
            <div class="stats-summary">
                <div class="stat-card">
                    <div class="stat-label">Missions Réussies</div>
                    <div class="stat-val" id="total-missions">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Revenus Totaux</div>
                    <div class="stat-val" id="total-earnings" style="color:var(--success)">0 €</div>
                </div>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterLogs('all', this)">Tous les logs</button>
            <button class="filter-btn" onclick="filterLogs('Livraison', this)">Livraisons</button>
            <button class="filter-btn" onclick="filterLogs('Amende', this)">Amendes</button>
            <button class="filter-btn" onclick="filterLogs('Maintenance', this)">Entretien</button>
        </div>

        <div class="log-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Horodatage</th>
                        <th>Catégorie</th>
                        <th>Détails de l'opération</th>
                        <th>Distance</th>
                        <th style="text-align: right;">Impact Financier</th>
                    </tr>
                </thead>
                <tbody id="log-table-body">
                    <tr><td colspan="5" style="text-align:center; padding:80px; color:var(--muted); font-style: italic;">
                        Initialisation de la liaison satellite...
                    </td></tr>
                </tbody>
            </table>
        </div>

        <div class="footer-action">
            <a href="index.html" class="btn-back">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Retour au cockpit
            </a>
        </div>
    </div>

    <script>
        const socket = io();
        const driverName = localStorage.getItem('driverName') || "Invité";
        document.getElementById('driver-display').innerText = driverName.toUpperCase();
        let allLogs = [];

        socket.emit('get_driver_logs', driverName);

        socket.on('receive_logs', (logs) => {
            allLogs = logs.sort((a, b) => new Date(b.date) - new Date(a.date));
            renderLogs(allLogs);
            calculateStats(allLogs);
        });

        function calculateStats(logs) {
            const totalMissions = logs.filter(l => l.type === 'Livraison').length;
            const totalEarnings = logs.reduce((acc, curr) => acc + curr.amount, 0);
            
            document.getElementById('total-missions').innerText = totalMissions;
            document.getElementById('total-earnings').innerText = totalEarnings.toLocaleString() + " €";
        }

        function filterLogs(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const filtered = type === 'all' ? allLogs : allLogs.filter(l => l.type === type);
            renderLogs(filtered);
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('log-table-body');
            
            if (logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:100px; color:var(--muted); font-weight: 600;">Aucune archive trouvée pour cette catégorie.</td></tr>`;
                return;
            }

            tbody.innerHTML = logs.map(log => {
                const isPos = log.amount >= 0;
                let tagClass = "tag-delivery";
                if(log.type === 'Bonus') tagClass = "tag-bonus";
                if(log.type === 'Amende' || log.type === 'Achat') tagClass = "tag-fine";
                if(log.type === 'Maintenance') tagClass = "tag-maintenance";

                const dateObj = new Date(log.date);
                const dateStr = dateObj.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'});
                const timeStr = dateObj.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

                return `
                    <tr>
                        <td>
                            <div style="font-family: 'JetBrains Mono'; font-size: 0.85rem; font-weight: 700;">${dateStr}</div>
                            <div style="font-size: 0.7rem; color: var(--muted);">${timeStr}</div>
                        </td>
                        <td><span class="tag ${tagClass}">${log.type}</span></td>
                        <td style="font-weight:700; color: #e2e8f0;">${log.details || 'Opération système'}</td>
                        <td style="font-family:'JetBrains Mono'; color:var(--accent); font-weight: 700; font-size:0.9rem;">
                            ${log.distance ? `${log.distance} KM` : '---'}
                        </td>
                        <td class="amount ${isPos ? 'pos' : 'neg'}">
                            ${isPos ? '+' : ''}${log.amount.toLocaleString()} €
                        </td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
