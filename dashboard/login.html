<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Fleet Manager VTC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #94a3b8; --border: #334155;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }

        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.5px; }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        
        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter';
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-login:hover { background: #2563eb; }
        .btn-login:active { transform: scale(0.98); }

        .footer-note { margin-top: 25px; font-size: 0.75rem; color: var(--muted); }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Fleet Manager v4</h1>
        <p>Connectez-vous pour accéder à votre dashboard.</p>

        <div class="input-group">
            <label for="username">Nom du Chauffeur</label>
            <input type="text" id="username" placeholder="Ex: Damian_VTC" autocomplete="off">
        </div>

        <button class="btn-login" onclick="login()">SE CONNECTER</button>

        <div class="footer-note">
            En vous connectant, vos statistiques de route seront synchronisées en temps réel avec le Dispatch.
        </div>
    </div>

    <script>
        // Si déjà connecté, on redirige vers le dashboard
        if (localStorage.getItem('vtcName')) {
            window.location.href = "index.html";
        }

        function login() {
            const name = document.getElementById('username').value.trim();
            
            if (name.length < 3) {
                alert("Veuillez entrer un nom de chauffeur valide (minimum 3 caractères).");
                return;
            }

            // Sauvegarde du nom dans le navigateur
            localStorage.setItem('vtcName', name);
            
            // Redirection vers le tableau de bord
            window.location.href = "index.html";
        }

        // Permet de valider avec la touche "Entrée"
        document.getElementById('username').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
