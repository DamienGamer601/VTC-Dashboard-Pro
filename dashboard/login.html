<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Flotte - VTC Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f8fafc; 
            --accent: #2563eb; 
            --card: #ffffff; 
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body { 
            background: var(--bg); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 350px; 
            text-align: center; 
            border: 1px solid var(--border); 
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
            color: var(--text-main); 
            font-size: 1.1rem; 
            margin-bottom: 8px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            background: #fdfdfd;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            font-size: 0.95rem;
            cursor: pointer; 
            transition: 0.2s; 
        }

        button:hover { 
            background: #1d4ed8; 
            transform: translateY(-1px);
        }

        .footer { 
            margin-top: 30px; 
            font-size: 0.7rem; 
            color: #94a3b8; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Accès Terminal</h1>
        <p>Gestion de flotte VTC Pro</p>

        <div class="input-group">
            <label>Identifiant Chauffeur</label>
            <input type="text" id="driver-name" placeholder="Ex: Damian_77" autocomplete="off">
        </div>

        <button onclick="startSession()">Prendre son Service</button>

        <div class="footer">
            SCS Telemetry Cloud v4.0
        </div>
    </div>

    <script>
        // Redirection auto si déjà connecté
        if(localStorage.getItem('vtcName')) {
            window.location.href = "index.html";
        }

        function startSession() {
            const name = document.getElementById('driver-name').value.trim();
            
            if(name.length < 3) {
                alert("Identifiant trop court (min 3 caractères).");
                return;
            }

            localStorage.setItem('vtcName', name);
            window.location.href = "index.html";
        }

        // Entrée clavier
        document.getElementById('driver-name').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') startSession();
        });
    </script>
</body>
</html>
