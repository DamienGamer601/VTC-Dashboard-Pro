<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fin de Service - VTC Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0f172a; color: white; font-family: 'Inter', sans-serif; 
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
        }
        .summary-card {
            background: #1e293b; padding: 40px; border-radius: 20px; text-align: center;
            border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 350px;
        }
        .icon { font-size: 3rem; margin-bottom: 20px; }
        h1 { font-size: 1.2rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }
        .stat-box { margin: 25px 0; padding: 20px; background: #0f172a; border-radius: 12px; }
        .val { display: block; font-family: 'JetBrains Mono'; font-size: 2rem; color: #10b981; }
        .label { font-size: 0.75rem; color: #64748b; font-weight: 700; }
        .btn-confirm {
            background: #3b82f6; color: white; border: none; padding: 12px 30px;
            border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="summary-card">
        <div class="icon">🚛💨</div>
        <h1>Fin de Service</h1>
        <p id="bye-msg" style="font-size: 0.9rem; color: #94a3b8;">Excellent travail, chauffeur.</p>

        <div class="stat-box">
            <span class="label">SOLDE FINAL</span>
            <span id="final-wallet" class="val">0 €</span>
        </div>

        <button class="btn-confirm" onclick="finish()">RETOUR À L'ACCUEIL</button>
    </div>

    <script>
        // On récupère le nom et le solde stockés avant de les effacer
        const name = localStorage.getItem('vtcName');
        const wallet = localStorage.getItem('lastWallet'); // On utilisera le dernier solde connu

        if(name) document.getElementById('bye-msg').innerText = `À bientôt, ${name.toUpperCase()} !`;
        if(wallet) document.getElementById('final-wallet').innerText = wallet + " €";

        function finish() {
            // Nettoyage complet
            localStorage.removeItem('vtcName');
            localStorage.removeItem('lastWallet');
            sessionStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
