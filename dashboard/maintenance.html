<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Technique - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --accent: #f59e0b; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(245, 158, 11, 0.2);
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        }

        .ambient-light {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: conic-gradient(from 0deg at 50% 50%, transparent, rgba(245, 158, 11, 0.05), transparent);
            animation: rotateLight 4s linear infinite;
        }

        @keyframes rotateLight { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container { 
            text-align: center; padding: 50px 40px; z-index: 10; 
            background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border);
            border-radius: 40px; backdrop-filter: blur(20px);
            max-width: 550px; width: 90%;
            box-shadow: 0 0 50px rgba(245, 158, 11, 0.1);
        }

        .status-badge {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 20px; border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 100px; color: var(--accent); font-family: 'JetBrains Mono';
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px;
            background: rgba(245, 158, 11, 0.05); margin-bottom: 25px;
        }

        h1 { font-family: 'JetBrains Mono'; font-size: 2.2rem; margin: 0; color: white; font-weight: 900; }

        .countdown-box { margin-top: 30px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        
        /* Style du Timer */
        .time-display { 
            font-family: 'JetBrains Mono'; 
            font-size: 2.2rem; 
            color: var(--accent); 
            font-weight: 900; 
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }

        .time-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }

        .footer { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #334155; font-family: 'JetBrains Mono'; font-size: 0.6rem; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="container">
        <div class="status-badge">MAINTENANCE EN COURS</div>
        <h1>VTC-OPS <span style="color: var(--accent)">OFFLINE</span></h1>
        
        <div class="countdown-box">
            <div class="time-display" id="timer">SYNCHRONISATION...</div>
            <div class="time-label">Réouverture estimée des services</div>
        </div>
    </div>

    <div class="footer">DÉPARTEMENT TECHNIQUE VTC-OPS</div>

    <script>
        function updateTimer() {
            // On demande l'heure au serveur
            fetch('/api/maintenance-status')
                .then(response => response.json())
                .then(data => {
                    if (data.enabled && data.endTime) {
                        const now = Date.now();
                        const diff = data.endTime - now;

                        if (diff <= 0) {
                            document.getElementById('timer').innerText = "OUVERTURE IMMINENTE";
                            return;
                        }

                        // Calcul précis
                        const j = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);

                        // Affichage propre
                        document.getElementById('timer').innerText = 
                            `${j}j ${h.toString().padStart(2, '0')}h ${m.toString().padStart(2, '0')}m ${s.toString().padStart(2, '0')}s`;
                    } else if (!data.enabled) {
                        // Si l'admin coupe la maintenance, on recharge la page
                        window.location.href = "/";
                    }
                })
                .catch(err => {
                    document.getElementById('timer').innerText = "CONNEXION PERDUE";
                });
        }

        // Met à jour toutes les secondes
        setInterval(updateTimer, 1000);
        updateTimer(); // Lancement immédiat au chargement
    </script>
</body>
</html>
