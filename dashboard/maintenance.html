<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance en cours - VTC Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { padding: 40px; border: 2px solid #3b82f6; border-radius: 20px; background: #1e293b; }
        h1 { color: #3b82f6; margin-bottom: 10px; }
        p { color: #94a3b8; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <h1>TRAVAUX SUR LA FLOTTE</h1>
        <p>Le Dispatch effectue une mise à jour des serveurs.<br>Revenez dans quelques instants.</p>
    </div>
</body>
</html>
