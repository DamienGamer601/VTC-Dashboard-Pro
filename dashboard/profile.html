<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.5);
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 40px; background-image: radial-gradient(circle at 0% 0%, #1e293b 0%, #020617 100%);
        }

        .profile-grid {
            display: grid; grid-template-columns: 350px 1fr; gap: 30px; max-width: 1200px; margin: 0 auto;
        }

        /* --- CARTE IDENTITÉ --- */
        .id-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 30px;
            padding: 40px; text-align: center; position: relative; overflow: hidden;
        }
        .id-card::before {
            content: "OPERATOR"; position: absolute; top: 10px; right: -20px;
            background: var(--accent); color: white; padding: 5px 30px;
            font-size: 0.6rem; font-weight: 900; transform: rotate(45deg);
        }

        .avatar-circle {
            width: 120px; height: 120px; background: #1e293b; border-radius: 50%;
            margin: 0 auto 20px; border: 4px solid var(--accent);
            display: flex; align-items: center; justify-content: center; font-size: 3rem;
        }

        .driver-name { font-size: 1.8rem; font-weight: 900; margin-bottom: 5px; }
        .driver-rank { color: var(--accent); font-family: 'JetBrains Mono'; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        /* --- STATS ET PROGRESSION --- */
        .main-content { display: flex; flex-direction: column; gap: 30px; }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-box { 
            background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border); 
            padding: 25px; border-radius: 20px; 
        }
        .stat-val { display: block; font-size: 1.5rem; font-weight: 900; font-family: 'JetBrains Mono'; color: var(--accent); }
        .stat-lab { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; font-weight: 800; }

        .xp-bar-container {
            background: #1e293b; height: 12px; border-radius: 10px; margin-top: 15px; overflow: hidden;
        }
        .xp-bar-fill { height: 100%; background: var(--accent); width: 45%; box-shadow: 0 0 15px var(--accent); }

        /* --- CAMION ACTUEL --- */
        .truck-display {
            background: linear-gradient(45deg, #0f172a, #1e293b);
            border-radius: 30px; padding: 40px; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 40px;
        }
        .truck-info h3 { margin: 0; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
        .truck-model { font-size: 2rem; font-weight: 900; margin-top: 5px; }
        
        .btn-action {
            padding: 15px 30px; border-radius: 12px; border: none; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>

    <div class="profile-grid">
        <div class="id-card">
            <div class="avatar-circle">🚛</div>
            <div class="driver-name" id="d-name">--</div>
            <div class="driver-rank" id="d-rank">Conducteur Junior</div>
            
            <div style="margin-top: 40px; text-align: left;">
                <span class="stat-lab">Progression Grade</span>
                <div class="xp-bar-container">
                    <div class="xp-bar-fill" id="xp-fill" style="width: 0%"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.7rem; font-family: 'JetBrains Mono';">
                    <span id="xp-current">0 XP</span>
                    <span style="color: var(--muted);">LVL UP : 5000 XP</span>
                </div>
            </div>

            <a href="dashboard.html" class="btn-action btn-primary" style="margin-top: 50px; width: 100%; box-sizing: border-box;">RETOURNER AU LIVE</a>
        </div>

        <div class="main-content">
            <div class="stats-row">
                <div class="stat-box">
                    <span class="stat-lab">Distance Totale</span>
                    <span class="stat-val" id="d-dist">0 KM</span>
                </div>
                <div class="stat-box">
                    <span class="stat-lab">Solde Compte</span>
                    <span class="stat-val" id="d-wallet">0 €</span>
                </div>
                <div class="stat-box">
                    <span class="stat-lab">Missions Finies</span>
                    <span class="stat-val" id="d-jobs">0</span>
                </div>
            </div>

            <div class="truck-display">
                <div style="font-size: 4rem;">🚛</div>
                <div class="truck-info">
                    <h3>Unité Assignée</h3>
                    <div class="truck-model" id="t-model">--</div>
                    <p style="color: var(--muted); font-size: 0.85rem;" id="t-spec">Configuration Flotte Standard // État : Excellent</p>
                </div>
            </div>

            
        </div>
    </div>

    <script>
        const socket = io();
        const driverName = localStorage.getItem('driverName');

        if (!driverName) window.location.href = 'login.html';

        // Demander les infos complètes au serveur
        socket.emit('get_driver_profile', driverName);

        socket.on('receive_driver_profile', (data) => {
            document.getElementById('d-name').innerText = data.name;
            document.getElementById('d-dist').innerText = Math.floor(data.distance).toLocaleString() + " KM";
            document.getElementById('d-wallet').innerText = data.wallet.toLocaleString() + " €";
            document.getElementById('t-model').innerText = data.truck.brand + " " + (data.truck.model || "");
            
            // Calcul de la barre d'XP (basé sur un palier de 5000 pour l'exemple)
            const progress = (data.experience / 5000) * 100;
            document.getElementById('xp-fill').style.width = Math.min(progress, 100) + "%";
            document.getElementById('xp-current').innerText = Math.floor(data.experience) + " XP";
        });
    </script>
</body>
</html>
