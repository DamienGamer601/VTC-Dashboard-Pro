<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil Chauffeur - VTC Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #94a3b8; --border: #334155;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .profile-container { width: 100%; max-width: 600px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-back { background: transparent; border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; text-decoration: none; font-size: 0.8rem; }

        /* Carte Profil */
        .profile-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 40px; position: relative; overflow: hidden; }
        .profile-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: var(--accent); }

        .avatar-area { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .avatar-circle { width: 80px; height: 80px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 3px solid var(--accent); }
        
        .name-info h2 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }
        .rank-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-top: 5px; color: white; }

        /* Stats Section */
        .stats-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .stat-item { background: #0f172a; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; display: block; }
        .stat-value { font-family: 'JetBrains Mono'; font-size: 1.3rem; color: var(--accent); }

        /* Barre de Progression XP */
        .xp-progress-area { margin-top: 35px; }
        .xp-header { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 10px; font-weight: 600; }
        .progress-bg { height: 12px; background: #334155; border-radius: 6px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #60a5fa); width: 0%; transition: width 1s ease; }
        
        .footer-info { margin-top: 30px; text-align: center; color: var(--muted); font-size: 0.8rem; font-style: italic; }
    </style>
</head>
<body>

    <div class="profile-container">
        <header>
            <a href="index.html" class="btn-back">⬅ RETOUR DASHBOARD</a>
        </header>

        <div class="profile-card">
            <div class="avatar-area">
                <div class="avatar-circle">👤</div>
                <div class="name-info">
                    <h2 id="p-name">CHARGEMENT...</h2>
                    <div id="p-rank" class="rank-badge">ANALYSE...</div>
                </div>
            </div>

            <div class="stats-list">
                <div class="stat-item">
                    <span class="stat-label">Distance Totale</span>
                    <span id="p-dist" class="stat-value">0 KM</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Argent Cumulé</span>
                    <span id="p-wallet" class="stat-value">0 €</span>
                </div>
                <div class="stat-item" style="grid-column: span 2;">
                    <span class="stat-label">Dernière Livraison</span>
                    <span id="p-lastjob" class="stat-value" style="font-size: 1rem; color: #10b981;">---</span>
                </div>
            </div>

            <div class="xp-progress-area">
                <div class="xp-header">
                    <span>Progression Niveau</span>
                    <span id="xp-text">0 / 500 XP</span>
                </div>
                <div class="progress-bg">
                    <div id="xp-bar" class="progress-fill"></div>
                </div>
            </div>

            <div class="footer-info" id="p-status">
                Compte chauffeur certifié par Damian VTC Logistic.
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const user = localStorage.getItem('vtcName');

        if (!user) window.location.href = "login.html";

        // Mêmes paliers d'XP que le dashboard
        function getRank(xp) {
            if (xp < 500) return { name: "Stagiaire", color: "#64748b", next: 500 };
            if (xp < 2000) return { name: "Chauffeur Pro", color: "#2563eb", next: 2000 };
            if (xp < 5000) return { name: "Expert Route", color: "#10b981", next: 5000 };
            return { name: "Légende VTC", color: "#f59e0b", next: 10000 };
        }

        socket.on('update_leaderboard', (drivers) => {
            const me = drivers.find(d => d.name.toLowerCase() === user.toLowerCase());
            
            if (me) {
                document.getElementById('p-name').innerText = me.name.toUpperCase();
                document.getElementById('p-dist').innerText = Math.round(me.distance) + " KM";
                document.getElementById('p-wallet').innerText = me.wallet.toLocaleString() + " €";
                document.getElementById('p-lastjob').innerText = me.lastJob || "Aucune mission";

                const xp = me.experience || 0;
                const rank = getRank(xp);
                
                // Badge
                const b = document.getElementById('p-rank');
                b.innerText = rank.name;
                b.style.backgroundColor = rank.color;

                // Barre XP
                const progress = (xp / rank.next) * 100;
                document.getElementById('xp-bar').style.width = Math.min(progress, 100) + "%";
                document.getElementById('xp-text').innerText = `${Math.round(xp)} / ${rank.next} XP`;
            }
        });
    </script>
</body>
</html>
