<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recrutement - VTC Ops</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.6);
            --success: #10b981; --danger: #ef4444; --gold: #f59e0b;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
            overflow: hidden;
        }

        /* Scanline Overlay */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 1000; background-size: 100% 4px; pointer-events: none; opacity: 0.15;
        }

        .register-card { 
            background: rgba(15, 23, 42, 0.8); padding: 50px; border-radius: 40px; 
            border: 1px solid var(--border); width: 100%; max-width: 460px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px); position: relative; 
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .header-reg { text-align: center; margin-bottom: 40px; }
        .badge {
            display: inline-block; padding: 6px 14px; background: rgba(59, 130, 246, 0.1);
            color: var(--accent); border-radius: 100px; font-size: 0.65rem; font-weight: 900;
            letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .header-reg h1 { font-family: 'JetBrains Mono'; font-size: 2rem; letter-spacing: -1.5px; margin: 0; font-weight: 900; }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block; font-size: 0.6rem; font-weight: 900; 
            text-transform: uppercase; color: var(--muted); margin-bottom: 8px; 
            letter-spacing: 2px; padding-left: 5px;
        }
        
        input, select { 
            width: 100%; padding: 16px; background: rgba(2, 6, 23, 0.5); border: 1px solid var(--border); 
            border-radius: 14px; color: white; font-family: 'Inter'; box-sizing: border-box;
            transition: 0.3s; font-size: 0.95rem;
        }
        input:focus, select:focus { 
            outline: none; border-color: var(--accent); 
            background: rgba(15, 23, 42, 0.9); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }

        .btn-submit { 
            width: 100%; padding: 20px; background: var(--accent); color: white; 
            border: none; border-radius: 16px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 3px; margin-top: 10px;
            transition: 0.4s; font-family: 'JetBrains Mono';
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #msg-box { 
            margin-top: 20px; padding: 15px; border-radius: 12px; font-size: 0.8rem; 
            display: none; text-align: center; font-weight: 600;
        }
        .msg-error { background: rgba(239, 68, 68, 0.1); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.2); }
        .msg-success { background: rgba(16, 185, 129, 0.1); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.2); }

        .footer-links { margin-top: 30px; text-align: center; font-size: 0.75rem; color: var(--muted); }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: 800; }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="header-reg">
            <div class="badge" id="status-badge">Protocole d'Enrôlement</div>
            <h1>FLOTTE <span style="color:var(--accent)">VTC OPS</span></h1>
        </div>

        <div id="register-form">
            <div class="form-group">
                <label>Indicatif Chauffeur</label>
                <input type="text" id="reg-name" placeholder="Pseudo" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>Code d'Accès</label>
                <input type="password" id="reg-pass" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>Division Matériel</label>
                <select id="reg-truck">
                    <option value="Scania">SCANIA // Division S-Series</option>
                    <option value="Volvo">VOLVO // Division FH-16</option>
                    <option value="Renault">RENAULT // Division T-High</option>
                    <option value="DAF">DAF // Division XG-Plus</option>
                </select>
            </div>

            <button class="btn-submit" onclick="submitApplication()">Envoyer le Dossier</button>
        </div>

        <div id="msg-box"></div>

        <div class="footer-links">
            Déjà inscrit ? <a href="login.html">Connexion Terminal</a>
        </div>
    </div>

    <script>
        const socket = io();

        // SÉCURITÉ : Vérifier si la charte a été acceptée
        window.onload = () => {
            if (localStorage.getItem('rulesAccepted') !== 'true') {
                alert("ACCÈS REFUSÉ : Vous devez accepter la charte conducteur avant l'enrôlement.");
                window.location.href = 'rules.html';
            }
        };

        function submitApplication() {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            const truck = document.getElementById('reg-truck').value;
            const btn = document.querySelector('.btn-submit');

            if(!name || !pass) {
                showMsg("ERREUR : Identifiants incomplets.", "error");
                return;
            }

            btn.innerText = "TRANSFERT...";
            btn.disabled = true;

            socket.emit('auth_register', { 
                name, 
                pass, 
                meta: { favoriteTruck: truck, joinDate: new Date() } 
            });
        }

        socket.on('register_pending', () => {
            showMsg("DOSSIER RÉCEPTIONNÉ. Un dispatcher va activer votre accès sous peu.", "success");
            document.getElementById('register-form').style.display = "none";
            document.getElementById('status-badge').innerText = "Statut : En Attente";
            document.getElementById('status-badge').style.color = "var(--gold)";
            // On peut supprimer le flag rulesAccepted une fois fini
            localStorage.removeItem('rulesAccepted');
        });

        socket.on('auth_error', (msg) => {
            const btn = document.querySelector('.btn-submit');
            btn.innerText = "RENVOYER LE DOSSIER";
            btn.disabled = false;
            showMsg(msg, "error");
        });

        function showMsg(text, type) {
            const msgBox = document.getElementById('msg-box');
            msgBox.innerText = text;
            msgBox.className = type === "error" ? "msg-error" : "msg-success";
            msgBox.style.display = "block";
        }
    </script>
</body>
</html>
