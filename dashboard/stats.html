<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyses de Performance - VTC Ops</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.6);
            --success: #10b981; --warning: #f59e0b; --purple: #a855f7;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 30px; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%);
        }

        .container { max-width: 1200px; margin: 0 auto; animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1); }

        /* HEADER ANALYTIQUE */
        .stats-header { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            margin-bottom: 40px; padding-bottom: 25px; border-bottom: 1px solid var(--border);
        }

        .header-title h1 { 
            font-family: 'JetBrains Mono'; font-size: 2.2rem; font-weight: 900; 
            margin: 0; letter-spacing: -2px; text-transform: uppercase;
        }
        
        .status-pill {
            padding: 6px 12px; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success);
            color: var(--success); border-radius: 8px; font-size: 0.65rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* GRILLE DE KPI */
        .kpi-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .kpi-card { 
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); 
            padding: 28px; border-radius: 28px; transition: 0.4s ease;
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }
        .kpi-card:hover { transform: translateY(-5px); border-color: var(--accent); background: var(--card); }
        .kpi-card::after {
            content: ""; position: absolute; top: 0; right: 0; width: 60px; height: 60px;
            background: linear-gradient(135deg, transparent 80%, rgba(59, 130, 246, 0.1) 0%);
        }

        .kpi-label { font-size: 0.65rem; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .kpi-value { font-family: 'JetBrains Mono'; font-size: 2rem; font-weight: 800; margin-top: 10px; display: flex; align-items: baseline; gap: 8px; }
        .kpi-unit { font-size: 0.9rem; color: var(--muted); font-weight: 600; }

        /* SECTIONS GRAPHIQUES */
        .charts-container { display: grid; grid-template-columns: 1.8fr 1fr; gap: 25px; }
        
        .chart-box { 
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border); 
            padding: 30px; border-radius: 35px; display: flex; flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .chart-wrapper { position: relative; width: 100%; height: 320px; }

        .chart-title { 
            font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--text); 
            margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px;
            display: flex; align-items: center; gap: 10px;
        }
        .chart-title::before { content: ""; width: 8px; height: 8px; background: var(--accent); border-radius: 2px; }

        /* NAVIGATION */
        .btn-back { 
            display: inline-flex; align-items: center; gap: 15px; margin-top: 40px; 
            color: var(--text); text-decoration: none; font-size: 0.8rem; font-weight: 900;
            padding: 18px 35px; border-radius: 20px; border: 1px solid var(--border);
            transition: 0.4s; text-transform: uppercase; letter-spacing: 2px;
            background: rgba(255,255,255,0.03);
        }
        .btn-back:hover { background: var(--accent); border-color: var(--accent); transform: translateX(-10px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1000px) { 
            .charts-container { grid-template-columns: 1fr; }
            .chart-wrapper { height: 280px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="stats-header">
            <div class="header-title">
                <div class="status-pill">Système de Télémétrie v2.4</div>
                <h1 style="margin-top: 15px;">DATACENTER <span style="color: var(--accent);">PROFIL</span></h1>
                <p style="color: var(--muted); margin-top: 5px; font-weight: 600;">Flux de données : <span id="driver-display" style="color: white;">---</span></p>
            </div>
            <div style="text-align: right; color: var(--muted); font-size: 0.7rem; font-family: 'JetBrains Mono';">
                LAST_UPDATE: <span id="timestamp">--:--:--</span>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">Vélocité Moyenne</div>
                <div class="kpi-value" id="avg-speed">0 <span class="kpi-unit">KM/H</span></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Efficacité Carburant</div>
                <div class="kpi-value" id="avg-fuel" style="color: var(--warning);">32.4 <span class="kpi-unit">L/100</span></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Rentabilité Logistique</div>
                <div class="kpi-value" id="rev-km" style="color: var(--success);">0.00 <span class="kpi-unit">€/KM</span></div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Temps de Service</div>
                <div class="kpi-value" id="drive-time">00<span class="kpi-unit">H</span> 00<span class="kpi-unit">M</span></div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <div class="chart-title">Index des Revenus Hebdomadaires</div>
                <div class="chart-wrapper">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
            
            <div class="chart-box">
                <div class="chart-title">Déploiement Distance</div>
                <div class="chart-wrapper">
                    <canvas id="distanceChart"></canvas>
                </div>
            </div>
        </div>

        <a href="index.html" class="btn-back">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            Retour au Terminal Principal
        </a>
    </div>

    <script>
        const socket = io();
        const driverName = localStorage.getItem('driverName') || "CHAUFFEUR";
        document.getElementById('driver-display').innerText = driverName.toUpperCase();
        
        // Update Timestamp
        setInterval(() => {
            const now = new Date();
            document.getElementById('timestamp').innerText = now.toLocaleTimeString();
        }, 1000);

        // Chart Config Globale
        Chart.defaults.color = '#64748b';
        Chart.defaults.font.family = "'JetBrains Mono', monospace";
        Chart.defaults.font.size = 10;

        // Graphique 1 : Revenus (Line)
        const revCtx = document.getElementById('revenueChart').getContext('2d');
        const revGradient = revCtx.createLinearGradient(0, 0, 0, 400);
        revGradient.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
        revGradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

        const revenueChart = new Chart(revCtx, {
            type: 'line',
            data: {
                labels: ['LUN', 'MAR', 'MER', 'JEU', 'VEN', 'SAM', 'DIM'],
                datasets: [{
                    data: [15400, 12900, 21000, 18500, 26000, 32000, 29000],
                    borderColor: '#3b82f6',
                    borderWidth: 4,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: revGradient,
                    pointBackgroundColor: '#3b82f6',
                    pointBorderColor: '#fff',
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, border: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });

        // Graphique 2 : Distance (Bar)
        const distChart = new Chart(document.getElementById('distanceChart'), {
            type: 'bar',
            data: {
                labels: ['L', 'M', 'M', 'J', 'V', 'S', 'D'],
                datasets: [{
                    data: [420, 310, 590, 480, 720, 910, 840],
                    backgroundColor: '#a855f7',
                    borderRadius: 10,
                    hoverBackgroundColor: '#3b82f6'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' }, border: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });

        // Socket Real-time Updates
        socket.on('update_dashboard', (data) => {
            if(data.truck) {
                document.getElementById('avg-speed').innerHTML = `${Math.round(data.truck.speed)} <span class="kpi-unit">KM/H</span>`;
            }
            if(data.distance && data.wallet) {
                const ratio = (data.wallet / data.distance).toFixed(2);
                document.getElementById('rev-km').innerHTML = `${ratio} <span class="kpi-unit">€/KM</span>`;
            }
        });
    </script>
</body>
</html>
