<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyses de Performance - VTC Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #020617; --card: #0f172a; --accent: #3b82f6; 
            --text: #f8fafc; --muted: #64748b; --border: rgba(51, 65, 85, 0.5);
            --success: #10b981; --warning: #f59e0b;
        }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 100%);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; animation: fadeIn 0.6s ease-out; }

        .stats-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 40px; padding: 20px 0; border-bottom: 1px solid var(--border);
        }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 24px; border-radius: 24px; transition: 0.3s;
        }

        /* --- STRUCTURE CHARTS (FIX BUG) --- */
        .charts-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        .chart-box { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 25px; border-radius: 32px;
            display: flex; flex-direction: column;
        }

        /* Conteneur pour limiter la croissance de Chart.js */
        .chart-wrapper {
            position: relative; 
            width: 100%;
            height: 300px; /* Hauteur fixe pour stabiliser le graphique */
        }

        .chart-title { 
            font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--muted); 
            margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-back { 
            display: inline-flex; align-items: center; gap: 12px; margin-top: 40px; 
            color: white; text-decoration: none; font-size: 0.9rem; font-weight: 700;
            padding: 14px 28px; border-radius: 16px; background: var(--accent);
            transition: 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        @media (max-width: 900px) { 
            .charts-container { grid-template-columns: 1fr; }
            .chart-wrapper { height: 250px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="stats-header">
            <div>
                <h1 style="font-family:'JetBrains Mono'; font-weight:900;">PERFORMANCE <span style="color: var(--accent);">HUB</span></h1>
                <p style="color: var(--muted);">Rapport pour <span id="driver-display" style="color: white; font-weight: 800;">---</span></p>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div style="font-size:0.7rem; color:var(--muted); font-weight:800; text-transform:uppercase;">Vitesse Moyenne</div>
                <div style="font-family:'JetBrains Mono'; font-size:1.8rem; font-weight:700; margin-top:8px;" id="avg-speed">0 <span style="font-size:0.9rem; color:var(--muted);">km/h</span></div>
            </div>
            <div class="kpi-card">
                <div style="font-size:0.7rem; color:var(--muted); font-weight:800; text-transform:uppercase;">Consommation</div>
                <div style="font-family:'JetBrains Mono'; font-size:1.8rem; font-weight:700; margin-top:8px;" id="avg-fuel">0.0 <span style="font-size:0.9rem; color:var(--muted);">L/km</span></div>
            </div>
            <div class="kpi-card">
                <div style="font-size:0.7rem; color:var(--muted); font-weight:800; text-transform:uppercase;">Ratio € / KM</div>
                <div style="font-family:'JetBrains Mono'; font-size:1.8rem; font-weight:700; margin-top:8px;" id="rev-km">0.00 <span style="font-size:0.9rem; color:var(--muted);">€/km</span></div>
            </div>
            <div class="kpi-card">
                <div style="font-size:0.7rem; color:var(--muted); font-weight:800; text-transform:uppercase;">Service Actif</div>
                <div style="font-family:'JetBrains Mono'; font-size:1.8rem; font-weight:700; margin-top:8px;" id="drive-time">00<span style="font-size:0.9rem; color:var(--muted);">h</span> 00<span style="font-size:0.9rem; color:var(--muted);">m</span></div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <div class="chart-title">Évolution des Revenus</div>
                <div class="chart-wrapper">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
            
            <div class="chart-box">
                <div class="chart-title">Répartition Distance / Jour</div>
                <div class="chart-wrapper">
                    <canvas id="distanceChart"></canvas>
                </div>
            </div>
        </div>

        <a href="index.html" class="btn-back">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg>
            RETOUR AU TABLEAU DE BORD
        </a>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const driverName = localStorage.getItem('driverName') || "Chauffeur";
        document.getElementById('driver-display').innerText = driverName;

        Chart.defaults.color = '#64748b';
        Chart.defaults.font.family = "'Inter', sans-serif";

        // --- GRAPH REVENUS ---
        new Chart(document.getElementById('revenueChart'), {
            type: 'line',
            data: {
                labels: ['LUN', 'MAR', 'MER', 'JEU', 'VEN', 'SAM', 'DIM'],
                datasets: [{
                    label: 'Gains',
                    data: [15000, 12000, 22000, 18000, 25000, 31000, 28000],
                    borderColor: '#3b82f6',
                    borderWidth: 4,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    pointRadius: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });

        // --- GRAPH DISTANCE (Corrigé) ---
        new Chart(document.getElementById('distanceChart'), {
            type: 'bar',
            data: {
                labels: ['L', 'M', 'M', 'J', 'V', 'S', 'D'],
                datasets: [{
                    data: [400, 300, 600, 450, 700, 950, 800],
                    backgroundColor: '#a855f7',
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // OBLIGATOIRE
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });

        socket.on('update_dashboard', (data) => {
            if(data.truck) {
                document.getElementById('avg-speed').innerHTML = `${Math.round(data.truck.speed)} <span style="font-size:0.9rem; color:var(--muted);">km/h</span>`;
            }
            if(data.distance) {
                const ratio = (data.wallet / data.distance).toFixed(2);
                document.getElementById('rev-km').innerHTML = `${ratio} <span style="font-size:0.9rem; color:var(--muted);">€/km</span>`;
            }
        });
    </script>
</body>
</html>
